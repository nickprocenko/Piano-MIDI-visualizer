<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: transparent; }
    canvas { display: block; width: 100%; height: 100%; }
  </style>
</head>
<body>
  <canvas id="c"></canvas>
  <script>
  "use strict";

  const canvas = document.getElementById('c');
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;

  const gl = canvas.getContext('webgl2', { alpha: true, premultipliedAlpha: false });
  if (!gl) { console.error('WebGL2 not available'); }

  // Floating-point FBO rendering (required for vel/pres/dye textures).
  gl.getExtension('EXT_color_buffer_float');

  // ── Simulation grid ──────────────────────────────────────────────────────
  const SIM_SCALE = 0.5;
  const simW   = Math.max(2, Math.floor(canvas.width  * SIM_SCALE));
  const simH   = Math.max(2, Math.floor(canvas.height * SIM_SCALE));
  const aspect = simW / simH;
  const texelX = 1.0 / simW;
  const texelY = 1.0 / simH;

  // ── Live config (writable by pywebview via cfg.xxx = value) ──────────────
  const cfg = {
    curlStrength:    30.0,
    velDissipation:   0.7,
    dyeDissipation:   2.2,
    pressure:         0.8,
    pressureIters:   20,
    intensity:        1.0,
  };

  // ── Shader sources (GLSL ES 3.00) ────────────────────────────────────────

  const VERT_SIMPLE = `#version 300 es
in vec2 in_vert;
out vec2 vUv;
void main() {
  vUv = in_vert * 0.5 + 0.5;
  gl_Position = vec4(in_vert, 0.0, 1.0);
}`;

  const VERT_FULL = `#version 300 es
in vec2 in_vert;
out vec2 vUv;
out vec2 vL;
out vec2 vR;
out vec2 vT;
out vec2 vB;
uniform vec2 u_texelSize;
void main() {
  vUv = in_vert * 0.5 + 0.5;
  vL  = vUv - vec2(u_texelSize.x, 0.0);
  vR  = vUv + vec2(u_texelSize.x, 0.0);
  vT  = vUv + vec2(0.0, u_texelSize.y);
  vB  = vUv - vec2(0.0, u_texelSize.y);
  gl_Position = vec4(in_vert, 0.0, 1.0);
}`;

  const FRAG_ADVECT = `#version 300 es
precision highp float;
uniform sampler2D u_velocity;
uniform sampler2D u_quantity;
uniform vec2  u_texel;
uniform float u_dt;
uniform float u_dissipation;
in  vec2 vUv;
out vec4 fragColor;
void main() {
  vec2 coord = vUv - u_dt * texture(u_velocity, vUv).xy * u_texel;
  vec4 result = texture(u_quantity, coord);
  float decay = 1.0 + u_dissipation * u_dt;
  fragColor = result / decay;
}`;

  const FRAG_DIVERGENCE = `#version 300 es
precision highp float;
uniform sampler2D u_velocity;
in  vec2 vUv;
in  vec2 vL;
in  vec2 vR;
in  vec2 vT;
in  vec2 vB;
out vec4 fragColor;
void main() {
  float L = texture(u_velocity, vL).x;
  float R = texture(u_velocity, vR).x;
  float T = texture(u_velocity, vT).y;
  float B = texture(u_velocity, vB).y;
  vec2  C = texture(u_velocity, vUv).xy;
  if (vL.x < 0.0) { L = -C.x; }
  if (vR.x > 1.0) { R = -C.x; }
  if (vT.y > 1.0) { T = -C.y; }
  if (vB.y < 0.0) { B = -C.y; }
  fragColor = vec4(0.5 * (R - L + T - B), 0.0, 0.0, 1.0);
}`;

  const FRAG_CURL = `#version 300 es
precision highp float;
uniform sampler2D u_velocity;
in  vec2 vUv;
in  vec2 vL;
in  vec2 vR;
in  vec2 vT;
in  vec2 vB;
out vec4 fragColor;
void main() {
  float L = texture(u_velocity, vL).y;
  float R = texture(u_velocity, vR).y;
  float T = texture(u_velocity, vT).x;
  float B = texture(u_velocity, vB).x;
  fragColor = vec4(0.5 * (R - L - T + B), 0.0, 0.0, 1.0);
}`;

  const FRAG_VORTICITY = `#version 300 es
precision highp float;
uniform sampler2D u_velocity;
uniform sampler2D u_curl_tex;
uniform float u_dt;
uniform float u_curl_strength;
in  vec2 vUv;
in  vec2 vL;
in  vec2 vR;
in  vec2 vT;
in  vec2 vB;
out vec4 fragColor;
void main() {
  float L = texture(u_curl_tex, vL).x;
  float R = texture(u_curl_tex, vR).x;
  float T = texture(u_curl_tex, vT).x;
  float B = texture(u_curl_tex, vB).x;
  float C = texture(u_curl_tex, vUv).x;
  vec2 force = 0.5 * vec2(abs(T) - abs(B), abs(R) - abs(L));
  force /= length(force) + 0.0001;
  force *= u_curl_strength * C;
  force.y *= -1.0;
  vec2 vel = texture(u_velocity, vUv).xy + force * u_dt;
  vel = clamp(vel, -1000.0, 1000.0);
  fragColor = vec4(vel, 0.0, 1.0);
}`;

  const FRAG_CLEAR = `#version 300 es
precision highp float;
uniform sampler2D u_texture;
uniform float u_value;
in  vec2 vUv;
out vec4 fragColor;
void main() {
  fragColor = u_value * texture(u_texture, vUv);
}`;

  const FRAG_PRESSURE = `#version 300 es
precision highp float;
uniform sampler2D u_pressure;
uniform sampler2D u_divergence;
in  vec2 vUv;
in  vec2 vL;
in  vec2 vR;
in  vec2 vT;
in  vec2 vB;
out vec4 fragColor;
void main() {
  float pL = texture(u_pressure, vL).x;
  float pR = texture(u_pressure, vR).x;
  float pT = texture(u_pressure, vT).x;
  float pB = texture(u_pressure, vB).x;
  float pC = texture(u_pressure, vUv).x;
  if (vL.x < 0.0) { pL = pC; }
  if (vR.x > 1.0) { pR = pC; }
  if (vT.y > 1.0) { pT = pC; }
  if (vB.y < 0.0) { pB = pC; }
  float div = texture(u_divergence, vUv).x;
  fragColor = vec4((pL + pR + pB + pT - div) * 0.25, 0.0, 0.0, 1.0);
}`;

  const FRAG_GRADIENT_SUBTRACT = `#version 300 es
precision highp float;
uniform sampler2D u_pressure;
uniform sampler2D u_velocity;
in  vec2 vUv;
in  vec2 vL;
in  vec2 vR;
in  vec2 vT;
in  vec2 vB;
out vec4 fragColor;
void main() {
  float pL = texture(u_pressure, vL).x;
  float pR = texture(u_pressure, vR).x;
  float pT = texture(u_pressure, vT).x;
  float pB = texture(u_pressure, vB).x;
  float pC = texture(u_pressure, vUv).x;
  if (vL.x < 0.0) { pL = pC; }
  if (vR.x > 1.0) { pR = pC; }
  if (vT.y > 1.0) { pT = pC; }
  if (vB.y < 0.0) { pB = pC; }
  vec2 vel = texture(u_velocity, vUv).xy - vec2(pR - pL, pT - pB);
  fragColor = vec4(vel, 0.0, 1.0);
}`;

  const FRAG_SPLAT = `#version 300 es
precision highp float;
uniform sampler2D u_target;
uniform vec2  u_point;
uniform vec3  u_color;
uniform float u_radius;
uniform float u_aspect;
in  vec2 vUv;
out vec4 fragColor;
void main() {
  vec2 p = vUv - u_point;
  p.x *= u_aspect;
  float splat = exp(-dot(p, p) / (u_radius * u_radius));
  vec3 base = texture(u_target, vUv).rgb;
  fragColor = vec4(base + splat * u_color, 1.0);
}`;

  // Reinhard tonemap + gamma so bright splats don't hard-clip; alpha from luminance.
  const FRAG_DISPLAY = `#version 300 es
precision highp float;
uniform sampler2D u_dye;
uniform float u_intensity;
in  vec2 vUv;
out vec4 fragColor;
void main() {
  vec3 col = texture(u_dye, vUv).rgb * u_intensity;
  col = col / (col + vec3(0.5));
  col = pow(max(col, vec3(0.0)), vec3(1.0 / 2.2));
  float lum = dot(col, vec3(0.299, 0.587, 0.114));
  float alpha = clamp(lum * 2.0, 0.0, 1.0);
  fragColor = vec4(col, alpha);
}`;

  // ── WebGL helpers ────────────────────────────────────────────────────────

  function compileShader(type, src) {
    const s = gl.createShader(type);
    gl.shaderSource(s, src);
    gl.compileShader(s);
    if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) {
      console.error(gl.getShaderInfoLog(s), src.slice(0, 80));
    }
    return s;
  }

  function createProgram(vs, fs) {
    const prog = gl.createProgram();
    gl.attachShader(prog, compileShader(gl.VERTEX_SHADER,   vs));
    gl.attachShader(prog, compileShader(gl.FRAGMENT_SHADER, fs));
    gl.linkProgram(prog);
    if (!gl.getProgramParameter(prog, gl.LINK_STATUS)) {
      console.error(gl.getProgramInfoLog(prog));
    }
    return prog;
  }

  // Shared quad buffer (all VAOs point to the same VBO data).
  const quadBuf = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, quadBuf);
  gl.bufferData(gl.ARRAY_BUFFER,
    new Float32Array([-1, -1,  1, -1,  -1, 1,  1, 1]), gl.STATIC_DRAW);

  function makeVAO(prog) {
    const vao = gl.createVertexArray();
    gl.bindVertexArray(vao);
    gl.bindBuffer(gl.ARRAY_BUFFER, quadBuf);
    const loc = gl.getAttribLocation(prog, 'in_vert');
    gl.enableVertexAttribArray(loc);
    gl.vertexAttribPointer(loc, 2, gl.FLOAT, false, 0, 0);
    gl.bindVertexArray(null);
    return vao;
  }

  function makeTex(w, h, iFormat, format, type, filter) {
    const tex = gl.createTexture();
    gl.bindTexture(gl.TEXTURE_2D, tex);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, filter);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, filter);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
    gl.texImage2D(gl.TEXTURE_2D, 0, iFormat, w, h, 0, format, type, null);
    return tex;
  }

  function makeFBO(w, h, iFormat, format, type, filter) {
    const tex = makeTex(w, h, iFormat, format, type, filter);
    const fbo = gl.createFramebuffer();
    gl.bindFramebuffer(gl.FRAMEBUFFER, fbo);
    gl.framebufferTexture2D(gl.FRAMEBUFFER, gl.COLOR_ATTACHMENT0, gl.TEXTURE_2D, tex, 0);
    gl.bindFramebuffer(gl.FRAMEBUFFER, null);
    return { fbo, tex, w, h };
  }

  class DoubleFBO {
    constructor(w, h, iF, f, t, filter) {
      this._pair = [makeFBO(w, h, iF, f, t, filter), makeFBO(w, h, iF, f, t, filter)];
      this._r = 0;
    }
    get read()  { return this._pair[this._r]; }
    get write() { return this._pair[this._r ^ 1]; }
    swap()      { this._r ^= 1; }
  }

  // ── Programs & VAOs ──────────────────────────────────────────────────────

  const progs = {
    advect:           createProgram(VERT_SIMPLE, FRAG_ADVECT),
    clear:            createProgram(VERT_SIMPLE, FRAG_CLEAR),
    splat:            createProgram(VERT_SIMPLE, FRAG_SPLAT),
    display:          createProgram(VERT_SIMPLE, FRAG_DISPLAY),
    divergence:       createProgram(VERT_FULL,   FRAG_DIVERGENCE),
    curl:             createProgram(VERT_FULL,   FRAG_CURL),
    vorticity:        createProgram(VERT_FULL,   FRAG_VORTICITY),
    pressure:         createProgram(VERT_FULL,   FRAG_PRESSURE),
    gradSubtract:     createProgram(VERT_FULL,   FRAG_GRADIENT_SUBTRACT),
  };

  const vaos = {};
  for (const name in progs) vaos[name] = makeVAO(progs[name]);

  // ── Simulation buffers ───────────────────────────────────────────────────

  const vel  = new DoubleFBO(simW, simH, gl.RG32F,   gl.RG,   gl.FLOAT, gl.LINEAR);
  const pres = new DoubleFBO(simW, simH, gl.R32F,    gl.RED,  gl.FLOAT, gl.NEAREST);
  const dye  = new DoubleFBO(simW, simH, gl.RGBA32F, gl.RGBA, gl.FLOAT, gl.LINEAR);
  const divFBO  = makeFBO(simW, simH, gl.R32F, gl.RED, gl.FLOAT, gl.NEAREST);
  const curlFBO = makeFBO(simW, simH, gl.R32F, gl.RED, gl.FLOAT, gl.NEAREST);

  // ── Rendering utilities ──────────────────────────────────────────────────

  function bindTex(unit, tex) {
    gl.activeTexture(gl.TEXTURE0 + unit);
    gl.bindTexture(gl.TEXTURE_2D, tex);
  }

  function usePass(prog, fbo) {
    gl.useProgram(prog);
    if (fbo) {
      gl.bindFramebuffer(gl.FRAMEBUFFER, fbo.fbo);
      gl.viewport(0, 0, fbo.w, fbo.h);
    } else {
      gl.bindFramebuffer(gl.FRAMEBUFFER, null);
      gl.viewport(0, 0, canvas.width, canvas.height);
    }
  }

  function drawQuad(name) {
    gl.bindVertexArray(vaos[name]);
    gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
    gl.bindVertexArray(null);
  }

  function setTexelSize(prog) {
    gl.uniform2f(gl.getUniformLocation(prog, 'u_texelSize'), texelX, texelY);
  }

  // ── Simulation passes ────────────────────────────────────────────────────

  function advect(field, dt, diss) {
    const prog = progs.advect;
    usePass(prog, field.write);
    gl.uniform2f(gl.getUniformLocation(prog, 'u_texel'), texelX, texelY);
    gl.uniform1f(gl.getUniformLocation(prog, 'u_dt'), dt);
    gl.uniform1f(gl.getUniformLocation(prog, 'u_dissipation'), diss);
    bindTex(0, vel.read.tex);   gl.uniform1i(gl.getUniformLocation(prog, 'u_velocity'), 0);
    bindTex(1, field.read.tex); gl.uniform1i(gl.getUniformLocation(prog, 'u_quantity'), 1);
    drawQuad('advect');
    field.swap();
  }

  function computeCurl() {
    const prog = progs.curl;
    usePass(prog, curlFBO);
    setTexelSize(prog);
    bindTex(0, vel.read.tex); gl.uniform1i(gl.getUniformLocation(prog, 'u_velocity'), 0);
    drawQuad('curl');
  }

  function applyVorticity(dt) {
    const prog = progs.vorticity;
    usePass(prog, vel.write);
    setTexelSize(prog);
    gl.uniform1f(gl.getUniformLocation(prog, 'u_dt'), dt);
    gl.uniform1f(gl.getUniformLocation(prog, 'u_curl_strength'), cfg.curlStrength);
    bindTex(0, vel.read.tex); gl.uniform1i(gl.getUniformLocation(prog, 'u_velocity'), 0);
    bindTex(1, curlFBO.tex);  gl.uniform1i(gl.getUniformLocation(prog, 'u_curl_tex'), 1);
    drawQuad('vorticity');
    vel.swap();
  }

  function computeDivergence() {
    const prog = progs.divergence;
    usePass(prog, divFBO);
    setTexelSize(prog);
    bindTex(0, vel.read.tex); gl.uniform1i(gl.getUniformLocation(prog, 'u_velocity'), 0);
    drawQuad('divergence');
  }

  function seedPressure() {
    const prog = progs.clear;
    usePass(prog, pres.write);
    gl.uniform1f(gl.getUniformLocation(prog, 'u_value'), cfg.pressure);
    bindTex(0, pres.read.tex); gl.uniform1i(gl.getUniformLocation(prog, 'u_texture'), 0);
    drawQuad('clear');
    pres.swap();
  }

  function pressureJacobi() {
    const prog = progs.pressure;
    usePass(prog, pres.write);
    setTexelSize(prog);
    bindTex(0, pres.read.tex); gl.uniform1i(gl.getUniformLocation(prog, 'u_pressure'),   0);
    bindTex(1, divFBO.tex);    gl.uniform1i(gl.getUniformLocation(prog, 'u_divergence'),  1);
    drawQuad('pressure');
    pres.swap();
  }

  function subtractGradient() {
    const prog = progs.gradSubtract;
    usePass(prog, vel.write);
    setTexelSize(prog);
    bindTex(0, pres.read.tex); gl.uniform1i(gl.getUniformLocation(prog, 'u_pressure'), 0);
    bindTex(1, vel.read.tex);  gl.uniform1i(gl.getUniformLocation(prog, 'u_velocity'), 1);
    drawQuad('gradSubtract');
    vel.swap();
  }

  // ── Public API (called by pywebview via evaluate_js) ─────────────────────

  /**
   * Inject a Gaussian blob of velocity and dye at a normalised screen position.
   * normX/normY are in [0,1] with (0,0) at the top-left (pygame convention).
   * velX/velY are raw pixel-space velocities; scaled internally.
   * r, g, b are in [0,1].
   */
  window.addSplat = function(normX, normY, velX, velY, r, g, b, radius) {
    if (radius === undefined) radius = 0.012;
    const glY = 1.0 - normY;  // flip Y: WebGL origin is bottom-left
    const prog = progs.splat;

    // Splat dye
    usePass(prog, dye.write);
    gl.uniform1i(gl.getUniformLocation(prog, 'u_target'), 0);
    bindTex(0, dye.read.tex);
    gl.uniform2f(gl.getUniformLocation(prog, 'u_point'),  normX, glY);
    gl.uniform3f(gl.getUniformLocation(prog, 'u_color'),  r * 8.0, g * 8.0, b * 8.0);
    gl.uniform1f(gl.getUniformLocation(prog, 'u_radius'), radius);
    gl.uniform1f(gl.getUniformLocation(prog, 'u_aspect'), aspect);
    drawQuad('splat');
    dye.swap();

    // Splat velocity
    usePass(prog, vel.write);
    gl.uniform1i(gl.getUniformLocation(prog, 'u_target'), 0);
    bindTex(0, vel.read.tex);
    gl.uniform2f(gl.getUniformLocation(prog, 'u_point'),  normX, glY);
    gl.uniform3f(gl.getUniformLocation(prog, 'u_color'),  velX * 0.00015, -velY * 0.00015, 0.0);
    gl.uniform1f(gl.getUniformLocation(prog, 'u_radius'), radius * 2.0);
    gl.uniform1f(gl.getUniformLocation(prog, 'u_aspect'), aspect);
    drawQuad('splat');
    vel.swap();
  };

  // ── Animation loop ───────────────────────────────────────────────────────

  let lastTime = performance.now();

  function frame(now) {
    requestAnimationFrame(frame);

    const dt = Math.min((now - lastTime) / 1000.0, 0.033);
    lastTime = now;

    // Physics passes (mirrors fluid_renderer.py step() order)
    advect(vel, dt, cfg.velDissipation);
    computeCurl();
    applyVorticity(dt);
    computeDivergence();
    seedPressure();
    for (let i = 0; i < cfg.pressureIters; i++) pressureJacobi();
    subtractGradient();
    advect(dye, dt, cfg.dyeDissipation);

    // Display pass — transparent where no dye exists
    const prog = progs.display;
    usePass(prog, null);
    gl.clearColor(0.0, 0.0, 0.0, 0.0);
    gl.clear(gl.COLOR_BUFFER_BIT);
    gl.enable(gl.BLEND);
    gl.blendFuncSeparate(gl.SRC_ALPHA, gl.ONE_MINUS_SRC_ALPHA, gl.ONE, gl.ONE_MINUS_SRC_ALPHA);
    bindTex(0, dye.read.tex);
    gl.uniform1i(gl.getUniformLocation(prog, 'u_dye'),       0);
    gl.uniform1f(gl.getUniformLocation(prog, 'u_intensity'), cfg.intensity);
    drawQuad('display');
  }

  requestAnimationFrame(frame);
  </script>
</body>
</html>
