<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      background: #0a0c12;
      overflow: hidden;
    }

    /* Clips the horizontally-scrolling score */
    #viewport {
      position: absolute;
      inset: 0;
      overflow: hidden;
    }

    /* Translated left/right each frame to keep current note at playhead */
    #score-track {
      position: absolute;
      top: 0; left: 0;
      will-change: transform;
    }

    /* OSMD renders into a white music-paper background */
    #osmd-div {
      background: #fff;
      display: inline-block;
      padding: 6px 40px 10px;
      min-width: 200px;
    }

    /* Vertical playhead — fixed at PLAYHEAD_FRAC % from left */
    #playhead {
      position: absolute;
      top: 0; bottom: 0;
      width: 3px;
      background: rgba(255, 210, 40, 0.92);
      pointer-events: none;
      z-index: 100;
      box-shadow: 0 0 12px rgba(255, 210, 40, 0.5);
    }

    /* Subtle left gradient to fade out past notes */
    #fade-left {
      position: absolute;
      top: 0; bottom: 0; left: 0;
      width: 80px;
      background: linear-gradient(to right, #0a0c12 20%, transparent);
      pointer-events: none;
      z-index: 90;
    }

    /* Status / error message */
    #status {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: rgba(160, 165, 200, 0.85);
      font: 13px/1.5 'Segoe UI', Arial, sans-serif;
      text-align: center;
      white-space: pre-line;
      pointer-events: none;
    }
  </style>
</head>
<body>

<div id="viewport">
  <div id="score-track">
    <div id="osmd-div"></div>
  </div>
  <div id="playhead"></div>
  <div id="fade-left"></div>
</div>
<div id="status">Waiting for score…</div>

<script src="opensheetmusicdisplay.min.js"></script>
<script>
"use strict";

// ── Config ────────────────────────────────────────────────────────────────────
const PLAYHEAD_FRAC = 0.22;   // playhead at 22% from left
const LEAD_IN_MS    = 1500;   // matches MidiFilePlayer._LEAD_IN_MS

// ── DOM ───────────────────────────────────────────────────────────────────────
const scoreTrack = document.getElementById('score-track');
const playheadEl = document.getElementById('playhead');
const statusEl   = document.getElementById('status');

// ── State ─────────────────────────────────────────────────────────────────────
let osmd         = null;
let rendered     = false;
let currentMs    = -LEAD_IN_MS;

// Array of {timeMs, xPx} sorted by timeMs.
// xPx is relative to score-track origin (no CSS transform applied).
let timestampMap = [];
// px per ms derived from the map — used to extrapolate outside the map range
let pxPerMs      = 0.18;

// ── Playhead ──────────────────────────────────────────────────────────────────
function positionPlayhead() {
  playheadEl.style.left = (window.innerWidth * PLAYHEAD_FRAC) + 'px';
}
positionPlayhead();
window.addEventListener('resize', positionPlayhead);

// ── Public API (called via evaluate_js from Python) ───────────────────────────

/**
 * Load and render a MusicXML string.
 */
async function loadScore(musicXml) {
  rendered     = false;
  timestampMap = [];
  statusEl.style.display = 'flex';
  statusEl.textContent   = 'Rendering score…';
  scoreTrack.style.transform = 'translateX(0px)';

  if (!osmd) {
    osmd = new opensheetmusicdisplay.OpenSheetMusicDisplay('osmd-div', {
      autoResize:                       false,
      drawTitle:                        false,
      drawComposer:                     false,
      drawSubtitle:                     false,
      drawLyricist:                     false,
      drawCredits:                      false,
      newSystemAtXMLNewSystemAttribute: false,
      newPageAtXMLNewPageAttribute:     false,
      // Single long horizontal line — FlowKey style
      renderSingleHorizontalStaffline:  true,
    });
  }

  try {
    await osmd.load(musicXml);

    // Compact margins for a scrolling strip
    const er = osmd.EngravingRules;
    er.PageTopMargin            = 3;
    er.PageBottomMargin         = 3;
    er.PageLeftMargin           = 5;
    er.PageRightMargin          = 5;
    er.RenderSingleHorizontalStaffline = true;

    await osmd.render();

    statusEl.style.display = 'none';
    rendered = true;
    buildTimestampMap();
  } catch (err) {
    statusEl.textContent = 'Error rendering score:\n' + err.message;
    console.error('[OSMD]', err);
  }
}

/**
 * Receive current MIDI playback position (ms) from Python — called every frame.
 */
function updatePosition(ms) {
  currentMs = ms;
}

// ── Timestamp map ─────────────────────────────────────────────────────────────

/**
 * Build time-ms → score-x-px map by walking the OSMD cursor.
 * OSMD assigns cursor elements the id "cursorImg-0" (first cursor).
 */
function buildTimestampMap() {
  if (!osmd || !rendered) return;

  // Default BPM (will be 0 for many MusicXML files — use 120 as fallback)
  let bpm = 120;
  try {
    const defaultBpm = osmd.Sheet && osmd.Sheet.defaultStartTempoInBpm;
    if (defaultBpm && defaultBpm > 0) bpm = defaultBpm;
  } catch (_) {}

  const map = [];

  // ── Strategy A: walk cursor, read cursorImg-0 position ───────────────────
  try {
    const trackRect = scoreTrack.getBoundingClientRect();

    osmd.cursor.show();
    osmd.cursor.reset();

    while (!osmd.cursor.iterator.EndReached) {
      const ts     = osmd.cursor.iterator.currentTimeStamp;
      const timeMs = ts.realValue * 4.0 * (60000.0 / bpm);

      // OSMD names its cursor image "cursorImg-0"
      const curEl = document.getElementById('cursorImg-0');
      if (curEl) {
        const r  = curEl.getBoundingClientRect();
        const xPx = r.left - trackRect.left + r.width * 0.5;

        // Only record if x changed meaningfully (skip chords / same beat)
        if (map.length === 0 || xPx - map[map.length - 1].xPx > 1) {
          map.push({ timeMs, xPx });
        } else if (timeMs < map[map.length - 1].timeMs) {
          map[map.length - 1].timeMs = timeMs;
        }
      }

      osmd.cursor.next();
    }

    osmd.cursor.hide();
  } catch (err) {
    console.error('[OSMD] cursor walk failed:', err);
  }

  // ── Strategy B: OSMD graphic model (fallback if cursor gave nothing) ──────
  if (map.length === 0) {
    try {
      map.push(...buildMapFromGraphicModel(bpm));
    } catch (err) {
      console.error('[OSMD] graphic model fallback failed:', err);
    }
  }

  // Sort & deduplicate by time
  map.sort((a, b) => a.timeMs - b.timeMs);
  timestampMap = map;

  // Derive average scroll speed for extrapolation
  if (map.length >= 2) {
    const dx = map[map.length - 1].xPx  - map[0].xPx;
    const dt = map[map.length - 1].timeMs - map[0].timeMs;
    if (dt > 0) pxPerMs = dx / dt;
  }

  if (map.length === 0) {
    statusEl.style.display = 'flex';
    statusEl.textContent   = 'Could not map note positions.\nIs this a valid score?';
  }
}

function buildMapFromGraphicModel(bpm) {
  const result = [];
  const svgEl  = document.querySelector('#osmd-div svg');
  if (!svgEl) return result;

  const svgRect   = svgEl.getBoundingClientRect();
  const trackRect = scoreTrack.getBoundingClientRect();
  const offsetX   = svgRect.left - trackRect.left;
  const vb        = svgEl.viewBox.baseVal;
  const scaleX    = vb.width > 0 ? svgRect.width / vb.width : 1;

  for (const staffMeasures of osmd.GraphicSheet.MeasureList) {
    for (const measure of staffMeasures) {
      if (!measure) continue;
      for (const gse of (measure.StaffEntries || [])) {
        if (!gse) continue;
        const absX = gse.PositionAndShape.AbsolutePosition.x;
        const xPx  = offsetX + absX * scaleX;

        const mTs  = gse.parentMeasure.parentSourceMeasure.absoluteTimestamp;
        const eTs  = gse.relInMeasureTimestamp;
        const timeMs = (mTs.realValue + eTs.realValue) * 4.0 * (60000.0 / bpm);

        if (result.length === 0 || xPx - result[result.length - 1].xPx > 1) {
          result.push({ timeMs, xPx });
        }
      }
    }
  }
  return result;
}

// ── Scroll helpers ────────────────────────────────────────────────────────────

function getXForTime(ms) {
  const n = timestampMap.length;
  if (n === 0) return 0;

  // Extrapolate before first note (lead-in)
  if (ms < timestampMap[0].timeMs) {
    return timestampMap[0].xPx - (timestampMap[0].timeMs - ms) * pxPerMs;
  }
  // Extrapolate after last note (outro)
  if (ms > timestampMap[n - 1].timeMs) {
    return timestampMap[n - 1].xPx + (ms - timestampMap[n - 1].timeMs) * pxPerMs;
  }

  // Binary search for surrounding pair
  let lo = 0, hi = n - 1;
  while (lo < hi - 1) {
    const mid = (lo + hi) >> 1;
    if (timestampMap[mid].timeMs <= ms) lo = mid;
    else hi = mid;
  }

  const a = timestampMap[lo], b = timestampMap[hi];
  const t = (ms - a.timeMs) / (b.timeMs - a.timeMs);
  return a.xPx + t * (b.xPx - a.xPx);
}

// ── Animation loop ────────────────────────────────────────────────────────────

function tick() {
  requestAnimationFrame(tick);
  if (!rendered || timestampMap.length === 0) return;

  const phX   = window.innerWidth * PLAYHEAD_FRAC;
  const noteX = getXForTime(currentMs);
  scoreTrack.style.transform = `translateX(${(phX - noteX).toFixed(1)}px)`;
}

tick();
</script>
</body>
</html>
