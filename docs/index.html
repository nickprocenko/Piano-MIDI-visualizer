<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' 'unsafe-eval' blob: data: mediastream:;">
<title>Piano MIDI Visualizer</title>
<style>
:root {
  --bg:#0f0f14; --panel:#16161e; --accent:#00b4b4; --text:#d2d2d2;
  --muted:#969696; --border:#505060; --btn-bg:#232330; --btn-hover:#3c3c50;
  --on-bg:#1a3a1a; --on-color:#6ed76e; --off-bg:#3a1a1a; --off-color:#dc8c8c;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',Arial,sans-serif;font-size:14px;overflow:hidden;width:100vw;height:100vh;user-select:none}
#bg-canvas,#fluid-canvas,#main-canvas{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none}
#main-canvas{pointer-events:auto}
#bg-canvas{z-index:0}
#fluid-canvas{z-index:1;display:none}
#main-canvas{z-index:2}
/* HUD */
#hud{display:none;position:fixed;top:0;left:0;right:0;height:44px;background:rgba(15,15,20,.88);border-bottom:1px solid var(--border);z-index:20;align-items:center;padding:0 14px;gap:10px;backdrop-filter:blur(4px)}
#hud.active{display:flex}
#hud-left{flex:1;font-size:12px;color:var(--muted)}
#hud-center{font-size:13px;font-weight:600;color:var(--text)}
#hud-right{flex:1;display:flex;justify-content:flex-end;align-items:center;gap:6px}
#hud-fps{font-size:11px;color:var(--muted);font-variant-numeric:tabular-nums;min-width:48px;text-align:right}
.hud-btn{padding:5px 10px;background:var(--btn-bg);border:1px solid var(--border);border-radius:4px;color:var(--text);font-size:12px;cursor:pointer;font-family:inherit}
.hud-btn:hover{background:var(--btn-hover)}
/* Screens */
.screen{display:none;position:fixed;inset:0;background:var(--bg);z-index:30;flex-direction:column;align-items:center;justify-content:center}
.screen.active{display:flex}
/* Menu */
#menu-title{font-size:48px;font-weight:700;color:#e6e6e6;margin-bottom:56px;letter-spacing:-.5px}
.menu-buttons{display:flex;flex-direction:column;gap:16px}
.menu-btn{width:280px;height:58px;background:var(--btn-bg);border:1px solid var(--border);border-radius:8px;color:#d2d2d2;font-size:17px;font-weight:600;letter-spacing:.8px;cursor:pointer;font-family:inherit;transition:background .12s,color .12s}
.menu-btn:hover{background:var(--btn-hover);color:#fff}
/* Device/file screens */
.screen-title{font-size:26px;font-weight:700;color:#e6e6e6;margin-bottom:28px}
.device-list{width:480px;max-height:360px;overflow-y:auto;display:flex;flex-direction:column;gap:7px}
.device-item{padding:13px 18px;background:var(--btn-bg);border:1px solid var(--border);border-radius:6px;cursor:pointer;font-size:14px;transition:background .1s}
.device-item:hover{background:var(--btn-hover)}
.device-item.selected{border-color:var(--accent);color:var(--accent)}
.screen-back{margin-top:22px;padding:8px 24px;background:transparent;border:1px solid var(--border);border-radius:5px;color:var(--muted);font-size:13px;cursor:pointer;font-family:inherit}
.screen-back:hover{color:var(--text);border-color:var(--text)}
.midi-note{font-size:12px;color:var(--muted);margin-top:10px;text-align:center}
#drop-zone{width:480px;height:160px;border:2px dashed var(--border);border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;cursor:pointer;transition:border-color .15s}
#drop-zone:hover,#drop-zone.drag-over{border-color:var(--accent)}
#drop-zone p{color:var(--muted);font-size:13px}
#file-input{display:none}
.browse-btn{padding:7px 18px;background:var(--btn-bg);border:1px solid var(--border);border-radius:5px;color:var(--text);font-size:13px;cursor:pointer;font-family:inherit}
#recent-files{margin-top:16px;width:480px}
#recent-files h3{font-size:11px;color:var(--muted);margin-bottom:7px;text-transform:uppercase;letter-spacing:1px}
.recent-item{padding:7px 12px;background:var(--btn-bg);border:1px solid var(--border);border-radius:4px;margin-bottom:4px;cursor:pointer;font-size:12px;color:var(--text)}
.recent-item:hover{background:var(--btn-hover)}
/* Full settings screen */
#screen-settings{flex-direction:row !important;align-items:stretch !important;justify-content:flex-start !important}
#settings-nav{width:178px;min-width:178px;background:var(--panel);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:12px 0;overflow-y:auto}
.snav-title{padding:10px 18px 5px;font-size:11px;color:var(--muted);letter-spacing:1px;text-transform:uppercase}
.snav-btn{padding:10px 18px;background:none;border:none;color:var(--muted);font-size:13px;font-weight:600;cursor:pointer;text-align:left;font-family:inherit}
.snav-btn:hover{color:var(--text);background:rgba(255,255,255,.04)}
.snav-btn.active{color:var(--accent);background:rgba(0,180,180,.08)}
#settings-content{flex:1;overflow-y:auto;padding:20px 24px}
.stab-panel{display:none}
.stab-panel.active{display:block}
/* Settings sidebar panel */
#panel-settings{position:fixed;top:0;right:0;bottom:0;width:350px;background:var(--panel);border-left:1px solid var(--border);z-index:25;transform:translateX(100%);transition:transform .2s ease;display:flex;flex-direction:column;overflow:hidden}
#panel-settings.open{transform:translateX(0)}
/* Shared settings styles */
.tab-bar{display:flex;background:var(--panel);border-bottom:1px solid var(--border);overflow-x:auto;flex-shrink:0}
.tab-bar button{padding:9px 12px;border:none;border-bottom:3px solid transparent;background:none;color:var(--muted);font-family:inherit;font-size:11px;font-weight:600;cursor:pointer;letter-spacing:.4px;white-space:nowrap}
.tab-bar button:hover{color:var(--text)}
.tab-bar button.active{color:var(--accent);border-bottom-color:var(--accent)}
.tab-panels{flex:1;overflow-y:auto}
.tab-panel{display:none;padding:12px}
.tab-panel.active{display:block}
.section{background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:12px;margin-bottom:10px}
.section h2{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--accent);margin-bottom:10px;border-bottom:1px solid var(--border);padding-bottom:6px}
.row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.row:last-child{margin-bottom:0}
.row label{width:130px;min-width:130px;color:var(--muted);font-size:12px}
.row input[type=range]{flex:1;accent-color:var(--accent);cursor:pointer;height:4px}
.row .val{width:34px;text-align:right;font-size:12px;font-variant-numeric:tabular-nums}
.color-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.color-row label{width:130px;min-width:130px;color:var(--muted);font-size:12px}
.color-row input[type=color]{width:36px;height:26px;border:1px solid var(--border);border-radius:4px;cursor:pointer;background:none;padding:1px}
.rgb-wrap{flex:1;display:flex;flex-direction:column;gap:4px}
.rgb-wrap input[type=range]{width:100%;height:4px;cursor:pointer}
.effects-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:10px}
.toggle-btn{padding:7px 4px;border:1px solid var(--border);border-radius:4px;cursor:pointer;font-size:11px;font-weight:600;text-align:center;user-select:none;background:var(--btn-bg);color:var(--muted)}
.toggle-btn.on{background:var(--on-bg);color:var(--on-color);border-color:var(--on-color)}
.efx-sliders{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.theme-grid{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}
.theme-btn{padding:7px 14px;border:1px solid var(--border);border-radius:4px;cursor:pointer;font-size:12px;background:var(--btn-bg);color:var(--text);font-family:inherit}
.theme-btn:hover{background:var(--btn-hover)}
.theme-btn.active{border-color:var(--accent);color:var(--accent);background:rgba(0,180,180,.08)}
.vis-btn{padding:5px 14px;border:1px solid var(--border);border-radius:4px;cursor:pointer;font-size:12px;font-weight:600;background:var(--off-bg);color:var(--off-color);font-family:inherit}
.vis-btn.on{background:var(--on-bg);color:var(--on-color);border-color:var(--on-color)}
.action-btn{padding:6px 14px;border:1px solid var(--border);border-radius:4px;cursor:pointer;font-size:12px;background:var(--btn-bg);color:var(--text);font-family:inherit}
.action-btn:hover{background:var(--btn-hover)}
.led-status{display:inline-block;width:8px;height:8px;border-radius:50%;background:#555;margin-right:6px;vertical-align:middle}
.led-status.connected{background:var(--on-color)}
#toast{position:fixed;bottom:72px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.78);color:#fff;padding:8px 20px;border-radius:20px;font-size:13px;pointer-events:none;opacity:0;transition:opacity .25s;z-index:9999;white-space:nowrap}
#toast.show{opacity:1}
/* Background image item cards */
.bg-item-list{display:flex;flex-direction:column;gap:6px;margin:6px 0}
.bg-item-card{background:var(--btn-bg);border:1px solid var(--border);border-radius:6px;padding:6px 8px}
.bg-item-top{display:flex;align-items:center;gap:6px;margin-bottom:6px}
.bg-thumb-mini{width:52px;height:36px;border-radius:3px;background-size:cover;background-position:center;border:1px solid var(--border);flex-shrink:0}
.bg-item-name{flex:1;font-size:11px;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0}
.bg-thumb-gif{font-size:8px;font-weight:700;color:#0dd;background:rgba(0,0,0,.5);border-radius:2px;padding:0 3px;flex-shrink:0}
.bg-item-x{width:18px;height:18px;background:rgba(120,40,40,.85);color:#fff;border:none;border-radius:3px;font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0;flex-shrink:0}
.bg-item-x:hover{background:rgba(180,60,60,.9)}
.bg-item-sliders{display:grid;gap:3px}
.bg-slider-row{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--muted)}
.bg-slider-row label{width:36px;text-align:right;flex-shrink:0}
.bg-slider-row input[type=range]{flex:1;height:4px;accent-color:#0cc}
.bg-slider-row .bg-sv{width:30px;text-align:right;color:var(--text);flex-shrink:0}
/* Track config screen */
#track-channel-list{width:560px;max-height:420px;overflow-y:auto;display:flex;flex-direction:column;gap:8px}
.track-row{display:flex;align-items:center;gap:12px;padding:12px 16px;background:var(--btn-bg);border:1px solid var(--border);border-radius:6px;transition:opacity .15s}
.track-row.muted{opacity:.35}
.track-ch-label{font-size:13px;font-weight:600;min-width:58px}
.track-ch-meta{font-size:11px;color:var(--muted);flex:1}
.track-color-swatch{width:28px;height:28px;border-radius:4px;border:none;cursor:pointer;padding:2px;outline:1px solid var(--border)}
.track-mute-btn,.track-player-btn{padding:5px 10px;border-radius:4px;font-size:11px;cursor:pointer;border:1px solid var(--border);font-family:inherit;font-weight:600}
.track-mute-btn{background:var(--btn-bg);color:var(--text)}
.track-mute-btn.muted{background:var(--off-bg);color:var(--off-color);border-color:var(--off-color)}
.track-player-btn{background:var(--btn-bg);color:var(--muted)}
.track-player-btn.active{background:rgba(0,180,180,.15);color:var(--accent);border-color:var(--accent)}
.tracks-actions{display:flex;gap:12px;margin-top:24px;align-items:center}
#btn-tracks-play{width:auto;padding:0 36px;height:52px;font-size:16px}
</style>
</head>
<body>
<canvas id="bg-canvas" style="display:none"></canvas>
<div id="bg-slide-a" style="position:fixed;inset:0;z-index:0;background-size:cover;background-position:center;pointer-events:none"></div>
<div id="bg-slide-b" style="position:fixed;inset:0;z-index:0;background-size:cover;background-position:center;pointer-events:none;opacity:0"></div>
<canvas id="fluid-canvas"></canvas>
<canvas id="main-canvas" tabindex="0"></canvas>

<!-- HUD -->
<div id="hud">
  <div id="hud-left"><span id="hud-device">No device</span> · <span id="hud-notes">0 notes</span></div>
  <div id="hud-center"><span id="hud-song">Freeplay</span></div>
  <div id="hud-right">
    <span id="hud-fps"></span>
    <button class="hud-btn" id="btn-hud-settings">⚙ Settings</button>
    <button class="hud-btn" id="btn-hud-fullscreen">⛶</button>
    <button class="hud-btn" id="btn-hud-menu">Menu</button>
  </div>
</div>

<!-- Settings sidebar (visualizer) -->
<div id="panel-settings">
  <div style="display:flex;align-items:center;justify-content:space-between;padding:6px 10px;border-bottom:1px solid var(--border);flex-shrink:0">
    <span style="font-size:11px;font-weight:700;color:var(--muted);letter-spacing:.8px;text-transform:uppercase">Settings</span>
    <button class="hud-btn" id="btn-panel-close">✕ Close</button>
  </div>
  <div class="tab-bar" id="ptab-bar"></div>
  <div class="tab-panels" id="ptab-panels"></div>
</div>
<div id="toast"></div>

<!-- MENU SCREEN -->
<div class="screen active" id="screen-menu">
  <div id="menu-title">Piano MIDI Visualizer</div>
  <div class="menu-buttons">
    <button class="menu-btn" id="btn-select-file">SELECT FILE</button>
    <button class="menu-btn" id="btn-freeplay">FREEPLAY</button>
    <button class="menu-btn" id="btn-midi-device">MIDI DEVICE</button>
    <button class="menu-btn" id="btn-settings">SETTINGS</button>
    <button class="menu-btn" id="btn-fullscreen-menu">FULLSCREEN</button>
  </div>
</div>

<!-- DEVICE SELECT SCREEN -->
<div class="screen" id="screen-device">
  <div class="screen-title">Select MIDI Input</div>
  <div class="device-list" id="device-list"></div>
  <p class="midi-note" id="midi-api-note"></p>
  <button class="screen-back" id="btn-device-back">← Back</button>
</div>

<!-- FILE SELECT SCREEN -->
<div class="screen" id="screen-file">
  <div class="screen-title">Select MIDI File</div>
  <div id="drop-zone">
    <p>Drag &amp; drop a .mid file here</p>
    <button class="browse-btn" id="btn-browse">Browse…</button>
    <input type="file" id="file-input" accept=".mid,.midi">
  </div>
  <div id="recent-files"></div>
  <button class="screen-back" id="btn-file-back">← Back</button>
</div>

<!-- TRACK CONFIG SCREEN -->
<div class="screen" id="screen-tracks">
  <div class="screen-title" id="tracks-filename">Configure Tracks</div>
  <div id="track-channel-list"></div>
  <div class="tracks-actions">
    <button class="screen-back" id="btn-tracks-back">← Back</button>
    <button class="menu-btn" id="btn-tracks-play">▶ Play</button>
  </div>
</div>

<!-- FULL SETTINGS SCREEN -->
<div class="screen" id="screen-settings">
  <nav id="settings-nav">
    <div class="snav-title">Visual</div>
    <button class="snav-btn active" data-stab="notes">Notes</button>
    <button class="snav-btn" data-stab="effects">Effects</button>
    <button class="snav-btn" data-stab="fluid">Fluid</button>
    <button class="snav-btn" data-stab="keyboard">Keyboard</button>
    <button class="snav-btn" data-stab="display">Display</button>
    <div class="snav-title">Hardware</div>
    <button class="snav-btn" data-stab="hardware">Hardware</button>
    <button class="snav-btn" data-stab="led">LED Output</button>
    <button class="snav-btn" data-stab="audience">Audience</button>
    <div class="snav-title">Presets</div>
    <button class="snav-btn" data-stab="themes">Themes</button>
    <button class="snav-btn" data-stab="profiles">Profiles</button>
    <div style="flex:1"></div>
    <button class="screen-back" id="btn-settings-back" style="margin:16px;align-self:flex-start">← Back</button>
  </nav>
  <div id="settings-content"></div>
</div>

<script>
"use strict";

// ═══════════════════════════════════════════════════════
// CONFIG
// ═══════════════════════════════════════════════════════
const Config = {
  _d: {
    note_style: {
      speed_px_per_sec:420, width_px:12, edge_roundness_px:4,
      outer_edge_width_px:2, inner_blend_percent:35,
      glow_strength_percent:80, highlight_strength_percent:70,
      spark_amount_percent:100, smoke_amount_percent:100,
      press_smoke_amount_percent:100, decay_speed:80, decay_value:20,
      color_r:0, color_g:230, color_b:230,
      interior_r:120, interior_g:255, interior_b:255,
      color_mode:'solid', note_colors:null, user_script:'',
      effect_glow_enabled:1, effect_highlight_enabled:1,
      effect_sparks_enabled:1, effect_smoke_enabled:1,
      effect_press_smoke_enabled:0, effect_moon_dust_enabled:0,
      moon_dust_amount_percent:100, moon_dust_opacity_percent:100,
      effect_steam_smoke_enabled:0, effect_halo_pulse_enabled:0,
      effect_fluid_enabled:0,
      fluid_intensity:80, fluid_curl:30,
      fluid_density_dissipation:15, fluid_velocity_dissipation:7, fluid_pressure:80,
      fluid_splat_size:20, fluid_opacity:80, fluid_color_strength:100,
      fluid_own_color:0, fluid_own_r:0, fluid_own_g:230, fluid_own_b:230,
    },
    keyboard_style:{height_percent:18, brightness:100, visible:1, width_percent:100},
    display_style:{background_color:'#0f0f14', background_image:'', bg_slide_ms:5000, bg_fade_ms:1000, gif_speed_percent:100},
    led_output:{
      enabled:0, transport:'none', led_count:177, mirror_per_key:2,
      ble_service_uuid:'6E400001-B5A3-F393-E0A9-E50E24DCCA9E',
      ble_char_uuid:'6E400002-B5A3-F393-E0A9-E50E24DCCA9E',
      led_sustain:0, led_fade_amount:0, led_fade_speed:80,
    },
    audience_control:{enabled:0, ws_url:'', transition_ms:220},
    kick_chat:{enabled:0, channel_slug:'', transition_ms:600},
    hardware:{sustain_enabled:1},
    profiles:[],
    user_themes:[], active_user_theme_index:0,
    note_color_themes:[], active_note_theme:{type:'builtin',index:0},
    fluid_themes:[],
  },
  data:null,
  load(){
    let stored={};
    try{ stored=JSON.parse(localStorage.getItem('pianoVisCfg')||'{}'); }catch(e){}
    // note_colors must be null or a flat note-array object; if stored as a script-result
    // object ({notes:[],channelColors:[],...}) it will crash _merge — sanitise before merging
    if(stored.note_style&&stored.note_style.note_colors!==null&&typeof stored.note_style.note_colors==='object')
      stored.note_style.note_colors=null;
    this.data=this._merge(JSON.parse(JSON.stringify(this._d)),stored);
  },
  save(){localStorage.setItem('pianoVisCfg',JSON.stringify(this.data));},
  _merge(t,s){
    for(const k in s){
      if(s[k]!==null&&typeof s[k]==='object'&&!Array.isArray(s[k])&&t[k]!==null&&typeof t[k]==='object')
        this._merge(t[k],s[k]);
      else t[k]=s[k];
    }
    return t;
  },
  get ns(){return this.data.note_style;},
  get ks(){return this.data.keyboard_style;},
  get ds(){return this.data.display_style;},
  get lo(){return this.data.led_output;},
  get ac(){return this.data.audience_control;},
  get kc(){return this.data.kick_chat;},
};
Config.load();

// ═══════════════════════════════════════════════════════
// PIANO LAYOUT
// ═══════════════════════════════════════════════════════
const PIANO_FIRST=21, PIANO_LAST=108;
const BLACK_SET=new Set([1,3,6,8,10]);
const BK_W=0.60, BK_H=0.62;
function isBlack(n){return BLACK_SET.has(n%12);}

function buildLayout(W,H,hp,wp=100){
  const frac=Math.max(.05,Math.min(.5,hp/100));
  const pianoH=Math.round(H*frac), pianoY=H-pianoH;
  let nw=0; for(let n=PIANO_FIRST;n<=PIANO_LAST;n++) if(!isBlack(n))nw++;
  const pw=Math.round(W*Math.max(60,Math.min(100,wp))/100);
  const offsetX=Math.floor((W-pw)/2);
  const ww=pw/nw, bw=ww*BK_W, bh=pianoH*BK_H;
  const wkeys=new Map(), bkeys=new Map(), wc=new Map();
  let wi=0;
  for(let n=PIANO_FIRST;n<=PIANO_LAST;n++){
    if(isBlack(n))continue;
    const l=offsetX+Math.round(wi*ww), r=offsetX+Math.round((wi+1)*ww);
    wkeys.set(n,{x:l,y:pianoY,w:Math.max(1,r-l),h:pianoH});
    wc.set(n,l+(r-l)/2); wi++;
  }
  for(let n=PIANO_FIRST;n<=PIANO_LAST;n++){
    if(!isBlack(n))continue;
    let lw=n-1; while(lw>=PIANO_FIRST&&isBlack(lw))lw--;
    let rw=n+1; while(rw<=PIANO_LAST&&isBlack(rw))rw++;
    const lc=wc.get(lw),rc=wc.get(rw);
    if(lc==null||rc==null)continue;
    const cx=(lc+rc)*.5, x=Math.round(cx-bw*.5);
    bkeys.set(n,{x,y:pianoY,w:Math.max(1,Math.round(bw)),h:Math.round(bh)});
  }
  return{wkeys,bkeys,pianoY,pianoH,ww,offsetX,pw};
}
function getRect(lay,n){return lay.bkeys.get(n)||lay.wkeys.get(n)||null;}

// ═══════════════════════════════════════════════════════
// PIANO RENDERER
// ═══════════════════════════════════════════════════════
function sc(r,g,b,f){return[Math.max(0,Math.min(255,r*f|0)),Math.max(0,Math.min(255,g*f|0)),Math.max(0,Math.min(255,b*f|0))];}
function rgb(r,g,b){return`rgb(${r},${g},${b})`;}
function rgba(r,g,b,a){return`rgba(${r},${g},${b},${a})`;}

function drawPiano(ctx,lay,active,ks){
  if(!ks.visible)return;
  const{wkeys,bkeys,pianoY,pianoH,offsetX,pw}=lay;
  const W=ctx.canvas.width;
  const br=Math.max(.1,Math.min(1.5,ks.brightness/100));
  const pW=pw??W, pX=offsetX??0;
  const bg=ctx.createLinearGradient(pX,pianoY,pX,pianoY+pianoH);
  bg.addColorStop(0,rgb(...sc(20,23,30,br)));
  bg.addColorStop(1,rgb(...sc(10,12,18,br)));
  ctx.fillStyle=bg; ctx.fillRect(pX,pianoY,pW,pianoH);
  const lipH=Math.max(2,pianoH*.05|0);
  ctx.fillStyle=rgb(...sc(54,60,72,br)); ctx.fillRect(pX,pianoY,pW,lipH);
  const labelSz=Math.max(9,pianoH*.095|0);
  // White keys
  for(const[n,k]of wkeys){
    const pressed=active.has(n), dy=pressed?1:0, kh=pressed?Math.max(2,k.h-1):k.h, ky=k.y+dy;
    const g2=ctx.createLinearGradient(k.x,ky,k.x,ky+kh);
    if(pressed){g2.addColorStop(0,rgb(...sc(194,236,244,br)));g2.addColorStop(1,rgb(...sc(156,206,220,br)));}
    else{g2.addColorStop(0,rgb(...sc(248,248,244,br)));g2.addColorStop(1,rgb(...sc(224,224,220,br)));}
    ctx.fillStyle=g2; ctx.fillRect(k.x,ky,k.w,kh);
    ctx.strokeStyle=rgb(...sc(255,255,252,br)); ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(k.x+1,ky+1);ctx.lineTo(k.x+k.w-2,ky+1);ctx.stroke();
    ctx.strokeStyle=rgb(...sc(92,98,108,br));
    ctx.strokeRect(k.x+.5,ky+.5,k.w-1,kh-1);
    if(n%12===0){
      ctx.font=`bold ${labelSz}px 'Segoe UI',Arial`;
      ctx.fillStyle=rgb(...sc(112,118,128,br));
      ctx.textAlign='center';
      ctx.fillText('C'+(n/12|0-1),k.x+k.w/2,ky+kh-Math.max(3,kh*.06|0));
    }
  }
  // Black keys
  const brad=Math.max(3,pianoH*.035|0);
  for(const[n,k]of bkeys){
    const pressed=active.has(n), dy=pressed?1:0, kh=pressed?Math.max(2,k.h-1):k.h, ky=k.y+dy;
    const g2=ctx.createLinearGradient(k.x,ky,k.x,ky+kh);
    if(pressed){g2.addColorStop(0,rgb(...sc(96,170,188,br)));g2.addColorStop(1,rgb(...sc(30,84,108,br)));}
    else{g2.addColorStop(0,rgb(...sc(58,62,72,br)));g2.addColorStop(1,rgb(...sc(16,18,24,br)));}
    ctx.fillStyle=g2; ctx.beginPath();ctx.roundRect(k.x,ky,k.w,kh,brad);ctx.fill();
    const hlH=Math.max(2,kh*.08|0);
    ctx.fillStyle=rgb(...sc(120,130,148,br)); ctx.beginPath();ctx.roundRect(k.x+2,ky+2,Math.max(1,k.w-4),hlH,Math.max(1,brad-1));ctx.fill();
    if(pressed){
      ctx.strokeStyle=rgb(...sc(142,206,221,br)); ctx.lineWidth=2;
      ctx.beginPath();ctx.moveTo(k.x+2,ky+kh-3);ctx.lineTo(k.x+k.w-3,ky+kh-3);ctx.stroke();
    }
    ctx.strokeStyle=rgb(...sc(10,12,16,br)); ctx.lineWidth=1;
    ctx.beginPath();ctx.roundRect(k.x+.5,ky+.5,k.w-1,kh-1,brad);ctx.stroke();
  }
}

// ═══════════════════════════════════════════════════════
// TRAIL MANAGER + PARTICLES
// ═══════════════════════════════════════════════════════
const TRAIL_MIN=3, TRAIL_INSET=2;
const SPARK_LIFE=460, SMOKE_LIFE=1080, SPARK_G=240, MAX_SP=7, MAX_SM=8;

function anchorY(lay,n,ks,H){
  if(!ks.visible)return H;
  const r=getRect(lay,n); return r?r.y:H;
}
function trailW(lay,n,ns){
  const r=getRect(lay,n); if(!r)return ns.width_px;
  return Math.max(TRAIL_MIN,Math.min(r.w-TRAIL_INSET,ns.width_px));
}

class TrailManager{
  constructor(){this.active=new Map();this.all=[];}
  start(n,ch,lay,ns,ks,H){
    const r=getRect(lay,n); if(!r)return null;
    const ay=anchorY(lay,n,ks,H), tw=trailW(lay,n,ns), cx=r.x+r.w/2;
    const t={note:n,channel:ch??0,x:cx,topY:ay,bottomY:ay,width:tw,
      renderX:cx,renderTopY:ay,renderBottomY:ay,renderWidth:tw,
      released:false,ageMs:0,sparks:[],smoke:[],mist:[]};
    this.active.set(n,t); this.all.push(t);
    spawnSparks(t,ns); spawnMist(t,ns); return t;
  }
  release(n,ns){
    const t=this.active.get(n); if(!t)return;
    t.released=true; this.active.delete(n); spawnSmoke(t,ns);
  }
  anchor(n,lay,ns,ks,H){
    const t=this.active.get(n); if(!t)return;
    const r=getRect(lay,n); if(!r)return;
    t.x=r.x+r.w/2; t.bottomY=anchorY(lay,n,ks,H); t.width=trailW(lay,n,ns);
  }
  update(sdt,ns){
    const simDt=Math.max(1,Math.min(33,sdt));
    const dy=ns.speed_px_per_sec*(simDt/1000);
    updateParticles(this.all,simDt);
    const sv=[];
    for(const t of this.all){
      t.ageMs+=simDt; t.topY-=dy;
      if(t.released)t.bottomY-=dy;
      if(t.bottomY>0)sv.push(t);
    }
    this.all=sv;
    for(const[k,t]of this.active) if(!this.all.includes(t))this.active.delete(k);
  }
  interp(t,sdt){
    const bl=Math.max(.12,Math.min(.60,sdt/34));
    t.renderX+=(t.x-t.renderX)*bl;
    t.renderTopY+=(t.topY-t.renderTopY)*bl;
    t.renderBottomY+=(t.bottomY-t.renderBottomY)*bl;
    t.renderWidth+=(t.width-t.renderWidth)*bl;
  }
}

function spawnSparks(t,ns){
  if(!ns.effect_sparks_enabled){t.sparks=[];return;}
  const str=Math.max(0,Math.min(2,ns.spark_amount_percent/100));
  const cnt=Math.max(0,Math.round(MAX_SP*str)); t.sparks=[];
  for(let i=0;i<cnt;i++){
    const a=-Math.PI*.9+Math.random()*Math.PI*.8, sp=70+Math.random()*120;
    t.sparks.push({x:t.x+(Math.random()*8-4),y:t.bottomY,
      vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:SPARK_LIFE,maxLife:SPARK_LIFE,size:1.6+Math.random()*1.6});
  }
}
function spawnSmoke(t,ns){
  if(!ns.effect_smoke_enabled){t.smoke=[];return;}
  const str=Math.max(0,Math.min(2,ns.smoke_amount_percent/100));
  const steam=ns.effect_steam_smoke_enabled, cap=steam?MAX_SM+3:MAX_SM;
  const cnt=Math.max(0,Math.round(cap*str)); t.smoke=[];
  for(let i=0;i<cnt;i++){
    if(steam){
      const life=SMOKE_LIFE*(1.15+Math.random()*.4);
      t.smoke.push({x:t.x+(Math.random()*40-20),y:t.bottomY,
        vx:Math.random()*28-14,vy:-(30+Math.random()*36),life,maxLife:life,
        radius:3.2+Math.random()*3.8,steam:true,phase:Math.random()*Math.PI*2});
    }else{
      t.smoke.push({x:t.x+(Math.random()*32-16),y:t.bottomY,
        vx:Math.random()*56-28,vy:-(40+Math.random()*50),
        life:SMOKE_LIFE,maxLife:SMOKE_LIFE,radius:2+Math.random()*3});
    }
  }
}
function spawnMist(t,ns){
  if(!ns.effect_press_smoke_enabled){t.mist=[];return;}
  const str=Math.max(0,Math.min(2.5,ns.press_smoke_amount_percent/100));
  const cnt=Math.max(0,Math.round((4+MAX_SM/2)*str)); t.mist=[];
  for(let i=0;i<cnt;i++){
    const life=SMOKE_LIFE*(.45+Math.random()*.35);
    t.mist.push({x:t.x+(Math.random()*24-12),y:t.bottomY-(2+Math.random()*12),
      vx:Math.random()*36-18,vy:-(18+Math.random()*32),
      life,maxLife:life,radius:1.8+Math.random()*2.7,phase:Math.random()*Math.PI*2});
  }
}
function updateParticles(trails,dtMs){
  const s=dtMs/1000;
  for(const t of trails){
    if(t.sparks.length) t.sparks=t.sparks.filter(p=>{
      p.life-=dtMs; if(p.life<=0)return false;
      p.x+=p.vx*s;p.y+=p.vy*s;p.vx*=.985;p.vy+=SPARK_G*s; return true;
    });
    if(t.smoke.length) t.smoke=t.smoke.filter(p=>{
      p.life-=dtMs; if(p.life<=0)return false;
      if(p.steam){const curl=Math.sin((p.maxLife-p.life)*.010+p.phase);p.x+=(p.vx+curl*9)*s;}
      else p.x+=p.vx*s;
      p.y+=p.vy*s; p.vx*=.992; return true;
    });
    if(t.mist.length) t.mist=t.mist.filter(p=>{
      p.life-=dtMs; if(p.life<=0)return false;
      const curl=Math.sin((p.maxLife-p.life)*.014+p.phase);
      p.x+=(p.vx+curl*6)*s;p.y+=p.vy*s;p.vx*=.986; return true;
    });
  }
}

// ═══════════════════════════════════════════════════════
// FX RENDERER
// ═══════════════════════════════════════════════════════
const GLOW_PAD=20;
class FXRenderer{
  constructor(w,h){this._init(w,h);this.frameBloom=0;this.time=0;}
  resize(w,h){this._init(w,h);}
  _init(w,h){
    this.W=w;this.H=h;
    this.off=new OffscreenCanvas(w,h);this.octx=this.off.getContext('2d');
    this.bW=Math.max(1,w/6|0);this.bH=Math.max(1,h/6|0);
    this.bloom=new OffscreenCanvas(this.bW,this.bH);this.bctx=this.bloom.getContext('2d');
  }
  beginFrame(dt){
    this.octx.clearRect(0,0,this.W,this.H);
    this.bctx.clearRect(0,0,this.bW,this.bH);
    this.frameBloom=0; this.time+=dt;
  }
  drawTrail(ctx,t,ns){
    const cx=t.renderX,ty=t.renderTopY,by=t.renderBottomY,w=t.renderWidth;
    const h=Math.max(2,by-ty); if(by<0||ty>this.H)return;
    const hw=w/2;
    const{r,g,b}=resolveNoteColor(t.note,t.channel,ns);
    const bl=ns.inner_blend_percent/100;
    const ir=Math.round(ns.interior_r*(1-bl)+r*bl);
    const ig=Math.round(ns.interior_g*(1-bl)+g*bl);
    const ib=Math.round(ns.interior_b*(1-bl)+b*bl);
    let glStr=Math.max(0,Math.min(1.8,ns.glow_strength_percent/100));
    const hlStr=Math.max(0,Math.min(1.7,ns.highlight_strength_percent/100));
    const decS=ns.decay_speed,decF=Math.max(0,Math.min(1,ns.decay_value/100));
    const botBr=Math.max(decF,1-decS/100);
    const rnd=Math.max(0,ns.edge_roundness_px);

    if(ns.effect_halo_pulse_enabled)
      glStr=Math.max(.08,glStr*(.80+.26*Math.sin(this.time*.004+cx*.012)));

    // Glow + bloom
    if(ns.effect_glow_enabled&&glStr>0){
      this.frameBloom=Math.max(this.frameBloom,glStr*.9);
      const gs=Math.max(decF,1-.5*decS/100);
      const gr=Math.min(255,r*gs|0),gg=Math.min(255,g*gs|0),gb=Math.min(255,b*gs|0);
      for(const[pad,aBase]of[[GLOW_PAD,20],[GLOW_PAD*2/3|0,40],[GLOW_PAD/3|0,82]]){
        const al=Math.round(aBase*glStr); if(al<=0)continue;
        const bRad=Math.max(0,rnd+pad/4|0);
        const gx=cx-hw-pad,gy=ty-pad,gw=w+pad*2,gh=h+pad*2;
        this.octx.fillStyle=rgba(gr,gg,gb,al/255);
        this.octx.beginPath();this.octx.roundRect(gx,gy,gw,gh,bRad);this.octx.fill();
        const sx=this.bW/this.W,sy=this.bH/this.H;
        this.bctx.fillStyle=rgba(gr,gg,gb,Math.min(1,al*2/255));
        this.bctx.beginPath();this.bctx.roundRect(gx*sx,gy*sy,Math.max(1,gw*sx),Math.max(1,gh*sy),Math.max(0,bRad*sx));this.bctx.fill();
      }
    }
    // Moon dust
    if(ns.effect_moon_dust_enabled){
      const stemLen=Math.max(1,h),swarm=Math.max(0,Math.min(14,(4+(stemLen/70|0))*(ns.moon_dust_amount_percent??100)/100|0));
      const span=Math.max(10,stemLen-10),base=(t.ageMs*.0058)+(cx*.014);
      for(let i=0;i<swarm;i++){
        const f=i/Math.max(1,swarm-1), ang=base+i*1.37;
        const orbit=w*(.55+.75*f)+7+(i%3)*3;
        const px=cx+Math.sin(ang)*orbit, py=by-f*span+Math.cos(ang*1.24+f*2.7)*(4+(8*f|0));
        const tw2=.52+.48*Math.sin(ang*2.5+i*.65);
        const al=Math.max(0,Math.min(255,(40+90*Math.max(0,tw2)+f*38)*(ns.moon_dust_opacity_percent??100)/100|0));
        this.octx.fillStyle=rgba(Math.min(255,ir*.55+120|0),Math.min(255,ig*.55+120|0),Math.min(255,ib*.60+128|0),al/255);
        this.octx.beginPath();this.octx.arc(px,py,i%4?1:2,0,Math.PI*2);this.octx.fill();
      }
    }
    // Core bars (on main ctx)
    if(w>0&&h>0){
      const bx=cx-hw;
      const og=ctx.createLinearGradient(bx,ty,bx,ty+h);
      og.addColorStop(0,rgb(r,g,b));
      og.addColorStop(1,rgb(r*botBr|0,g*botBr|0,b*botBr|0));
      ctx.fillStyle=og; ctx.beginPath();ctx.roundRect(bx,ty,w,h,Math.min(rnd,w/2,h/2));ctx.fill();
      const ei=ns.outer_edge_width_px, ins=Math.max(1,Math.min(ei,w/4|0));
      if(w>ins*2&&h>ins*2){
        const ix=bx+ins,iy=ty+ins,iw=w-ins*2,ih=h-ins*2;
        const ing=ctx.createLinearGradient(ix,iy,ix,iy+ih);
        ing.addColorStop(0,rgb(ir,ig,ib));
        ing.addColorStop(1,rgb(ir*botBr|0,ig*botBr|0,ib*botBr|0));
        ctx.fillStyle=ing;ctx.beginPath();ctx.roundRect(ix,iy,iw,ih,Math.max(0,Math.min(rnd-ins,iw/2,ih/2)));ctx.fill();
      }
      if(ns.effect_highlight_enabled&&hlStr>0){
        const hlW=Math.max(3,Math.min(Math.max(3,w/5|0),Math.max(3,w/3|0)));
        const htR=Math.min(255,r*.5+128|0),htG=Math.min(255,g*.5+128|0),htB=Math.min(255,b*.5+128|0);
        const al=Math.max(1,105*hlStr|0)/255;
        const hlg=ctx.createLinearGradient(bx+1,ty+1,bx+1,ty+h-2);
        hlg.addColorStop(0,rgba(htR,htG,htB,al));
        hlg.addColorStop(1,rgba(htR*botBr|0,htG*botBr|0,htB*botBr|0,al));
        ctx.fillStyle=hlg;ctx.beginPath();ctx.roundRect(bx+1,ty+1,hlW,Math.max(1,h-2),Math.max(0,Math.min(rnd-2,hlW/2,(h-2)/2)));ctx.fill();
      }
    }
    // Sparks
    if(ns.effect_sparks_enabled) for(const p of t.sparks){
      const lf=p.life/p.maxLife;
      const al=Math.max(0,Math.min(255,230*lf*lf*Math.min(1.4,ns.spark_amount_percent/100)|0));
      if(al<=0)continue;
      this.octx.fillStyle=rgba(Math.min(255,r*.35+170|0),Math.min(255,g*.35+170|0),Math.min(255,b*.35+170|0),al/255);
      this.octx.beginPath();this.octx.arc(p.x,p.y,Math.max(1,p.size*(.75+.75*lf)|0),0,Math.PI*2);this.octx.fill();
    }
    // Smoke
    if(ns.effect_smoke_enabled) for(const p of t.smoke){
      const lf=p.life/p.maxLife;
      const al=Math.max(0,Math.min(255,100*lf*lf*Math.min(1.4,ns.smoke_amount_percent/100)|0));
      if(al<=0)continue;
      this.octx.fillStyle=rgba(Math.min(255,r*.35+95|0),Math.min(255,g*.35+95|0),Math.min(255,b*.35+95|0),al/255);
      this.octx.beginPath();this.octx.arc(p.x,p.y,Math.max(1,p.radius*(1+.2*(1-lf))|0),0,Math.PI*2);this.octx.fill();
    }
    // Mist
    if(ns.effect_press_smoke_enabled) for(const p of t.mist){
      const lf=p.life/p.maxLife;
      const al=Math.max(0,Math.min(255,85*lf*lf|0)); if(al<=0)continue;
      this.octx.fillStyle=rgba(Math.min(255,ir*.45+110|0),Math.min(255,ig*.45+110|0),Math.min(255,ib*.50+120|0),al/255);
      this.octx.beginPath();this.octx.arc(p.x,p.y,Math.max(1,p.radius*(1+.3*(1-lf))|0),0,Math.PI*2);this.octx.fill();
    }
  }
  endFrame(ctx){
    if(this.frameBloom>0){
      const al=Math.max(1/255,Math.min(1,145/255*Math.min(1.35,this.frameBloom)));
      ctx.save();ctx.globalCompositeOperation='lighter';ctx.globalAlpha=al;
      ctx.drawImage(this.bloom,0,0,this.W,this.H);ctx.restore();
    }
    ctx.drawImage(this.off,0,0);
  }
}

// ═══════════════════════════════════════════════════════
// MIDI HANDLER
// ═══════════════════════════════════════════════════════
const QWERTY={
  KeyZ:48,KeyS:49,KeyX:50,KeyD:51,KeyC:52,KeyV:53,KeyG:54,KeyB:55,
  KeyH:56,KeyN:57,KeyJ:58,KeyM:59,Comma:60,KeyQ:60,
  Digit2:61,KeyW:62,Digit3:63,KeyE:64,KeyR:65,Digit5:66,
  KeyT:67,Digit6:68,KeyY:69,Digit7:70,KeyU:71,KeyI:72,
  Digit9:73,KeyO:74,Digit0:75,KeyP:76,BracketLeft:77,
};

class MidiHandler{
  constructor(){
    this.activeNotes=new Set();
    this.sustainedNotes=new Set();
    this.reattackedNotes=new Set();
    this.noteChannel=new Map();
    this.noteVelocity=new Map();
    this._sustain=false;
    this.portName='Computer Keyboard';
    this.connected=false;
    this._access=null;
    this._port=null;
    this._qwerty=false;
  }
  async init(portId){
    this._stopQwerty();
    if(portId==='keyboard'||!navigator.requestMIDIAccess){
      this._startQwerty(); return;
    }
    try{
      if(!this._access) this._access=await navigator.requestMIDIAccess({sysex:false});
      this._connect(portId);
      this._access.onstatechange=()=>this._connect(portId);
    }catch(e){this._startQwerty();}
  }
  _connect(portId){
    if(this._port){this._port.onmidimessage=null;}
    this._port=null; this.connected=false;
    if(!this._access)return;
    for(const p of this._access.inputs.values()){
      if(p.id===portId||portId==='first'){
        this._port=p; p.onmidimessage=e=>this._onMsg(e.data);
        this.portName=p.name; this.connected=true; break;
      }
    }
  }
  _onMsg(d){
    const st=d[0]&0xF0,ch=d[0]&0x0F,n=d[1],v=d[2];
    if(st===0x90&&v>0){
      if(this.activeNotes.has(n))this.reattackedNotes.add(n);
      this.activeNotes.add(n);
      this.noteVelocity.set(n,v);
      this.noteChannel.set(n,ch);
      this.sustainedNotes.delete(n);
    } else if(st===0x80||(st===0x90&&v===0)){
      if(this._sustain){this.sustainedNotes.add(n);}
      else{this.activeNotes.delete(n);this.noteChannel.delete(n);this.noteVelocity.delete(n);}
    } else if(st===0xB0&&n===64){
      const sustainEnabled=!!Config.data?.hardware?.sustain_enabled;
      if(sustainEnabled){
        this._sustain=v>=64;
        if(!this._sustain){
          for(const sn of this.sustainedNotes){this.activeNotes.delete(sn);this.noteChannel.delete(sn);this.noteVelocity.delete(sn);}
          this.sustainedNotes.clear();
        }
      }
      this._sustainTaps=this._sustainTaps||[];
      if(v>=64){
        const now=Date.now();
        this._sustainTaps.push(now);
        this._sustainTaps=this._sustainTaps.filter(t=>now-t<1000);
        if(this._sustainTaps.length>=3){this._sustainTaps=[];if(typeof onTripleSustainTap==='function')onTripleSustainTap();}
      }
    }
  }
  _startQwerty(){
    this._qwerty=true; this.portName='Computer Keyboard'; this.connected=true;
    window.addEventListener('keydown',this._kd=e=>{if(e.repeat)return;const n=QWERTY[e.code];if(n!=null){e.preventDefault();this.activeNotes.add(n);}});
    window.addEventListener('keyup',this._ku=e=>{const n=QWERTY[e.code];if(n!=null)this.activeNotes.delete(n);});
  }
  _stopQwerty(){
    if(this._kd)window.removeEventListener('keydown',this._kd);
    if(this._ku)window.removeEventListener('keyup',this._ku);
    this._qwerty=false; this._kd=this._ku=null;
  }
  listPorts(){
    const ports=[{id:'keyboard',name:'Computer Keyboard (QWERTY)'}];
    if(this._access) for(const p of this._access.inputs.values()) ports.push({id:p.id,name:p.name});
    return ports;
  }
  async requestAccess(){
    if(!navigator.requestMIDIAccess)return false;

// ═══════════════════════════════════════════════════════
// MIDI FILE PLAYER
// ═══════════════════════════════════════════════════════
function parseMidi(buf){
  const v=new DataView(buf); let p=0;
  const u32=()=>{const x=v.getUint32(p);p+=4;return x;};
  const u16=()=>{const x=v.getUint16(p);p+=2;return x;};
  const u8=()=>v.getUint8(p++);
  const vlq=()=>{let x=0;for(let i=0;i<4;i++){const b=u8();x=(x<<7)|(b&0x7F);if(!(b&0x80))return x;}return x;};
  if(u32()!==0x4D546864)return[]; // "MThd"
  u32(); const fmt=u16(),ntrks=u16(),div=u16();
  if(div&0x8000)return[];
  // Collect all tracks
  const tracks=[];
  for(let ti=0;ti<ntrks;ti++){
    const tag=u32(); if(tag!==0x4D54726B){u32();continue;} // "MTrk"
    const tLen=u32(),tEnd=p+tLen;
    const evts=[]; let tick=0,rs=0;
    while(p<tEnd){
      tick+=vlq();
      let st=v.getUint8(p);
      if(st&0x80){rs=st;p++;}else{st=rs;}
      const tp=st&0xF0;
      if(tp===0x90||tp===0x80){
        const n=u8(),vel=u8();
        evts.push({tick,type:tp===0x90?'on':'off',ch:st&0x0F,n,vel});
      }else if(tp===0xB0||tp===0xA0||tp===0xE0){u8();u8();}
      else if(tp===0xC0||tp===0xD0){u8();}
      else if(st===0xFF){
        const mt=u8(),ml=vlq();
        if(mt===0x51&&ml===3)evts.push({tick,type:'tempo',us:(u8()<<16)|(u8()<<8)|u8()});
        else p+=ml;
      }else if(st===0xF0||st===0xF7){p+=vlq();}
      else break;
    }
    p=tEnd; tracks.push(evts);
  }
  // Build tempo map from track 0 (format 1) or all tracks (format 0)
  const tempoMap=[{tick:0,us:500000,ms:0}];
  const tempoSrc=fmt===0?tracks[0]:(tracks[0]||[]);
  for(const e of tempoSrc) if(e.type==='tempo'){
    const prev=tempoMap[tempoMap.length-1];
    const ms=prev.ms+(e.tick-prev.tick)*prev.us/div/1000;
    tempoMap.push({tick:e.tick,us:e.us,ms});
  }
  function tickToMs(tick){
    let seg=tempoMap[0];
    for(let i=1;i<tempoMap.length;i++){if(tempoMap[i].tick>tick)break;seg=tempoMap[i];}
    return seg.ms+(tick-seg.tick)*seg.us/div/1000;
  }
  const all=[];
  for(const tr of tracks) for(const e of tr){
    if(e.type==='on'||e.type==='off')
      all.push({timeMs:tickToMs(e.tick),type:e.type==='on'?'noteon':'noteoff',note:e.n,velocity:e.vel,channel:e.ch??0});
  }
  all.sort((a,b)=>a.timeMs-b.timeMs||(a.type==='noteoff'?-1:1));
  return all;
}

class MidiFilePlayer{
  constructor(){this.events=[];this.playing=false;this.t0=0;this.pos=0;this.idx=0;this.activeNotes=new Set();this.noteChannel=new Map();this.noteVelocity=new Map();this.filename='';}
  load(buf,name){
    this.filename=name; this.events=parseMidi(buf);
    this.stop();
  }
  play(){if(!this.events.length)return;this.playing=true;this.t0=performance.now()-this.pos;this.idx=this._seek(this.pos);}
  pause(){this.playing=false;this.pos=performance.now()-this.t0;this.activeNotes.clear();this.noteChannel.clear();this.noteVelocity.clear();}
  stop(){this.playing=false;this.pos=0;this.idx=0;this.activeNotes.clear();this.noteChannel.clear();this.noteVelocity.clear();}
  update(){
    if(!this.playing)return false;
    const el=performance.now()-this.t0; let ch=false;
    while(this.idx<this.events.length&&this.events[this.idx].timeMs<=el){
      const e=this.events[this.idx++];
      if(e.type==='noteon'&&e.velocity>0){this.activeNotes.add(e.note);this.noteChannel.set(e.note,e.channel??0);this.noteVelocity.set(e.note,e.velocity);ch=true;}
      else if(e.type==='noteoff'||(e.type==='noteon'&&e.velocity===0)){this.activeNotes.delete(e.note);this.noteChannel.delete(e.note);this.noteVelocity.delete(e.note);ch=true;}
    }
    if(this.idx>=this.events.length){this.playing=false;this.activeNotes.clear();this.noteChannel.clear();this.noteVelocity.clear();this.pos=0;return true;}
    return ch;
  }
  getChannelInfo(){
    const info={};
    for(const e of this.events){
      if(e.type==='noteon'&&e.velocity>0){
        const c=e.channel??0;
        if(!info[c])info[c]={ch:c,count:0,minNote:127,maxNote:0};
        info[c].count++;
        if(e.note<info[c].minNote)info[c].minNote=e.note;
        if(e.note>info[c].maxNote)info[c].maxNote=e.note;
      }
    }
    return Object.values(info).sort((a,b)=>a.ch-b.ch);
  }
  _seek(ms){
    let lo=0,hi=this.events.length;
    while(lo<hi){const mid=lo+hi>>1;this.events[mid].timeMs<ms?lo=mid+1:hi=mid;}
    return lo;
  }
}

class FluidController{
  constructor(){
    this._enabled=false;
    this._canvas=document.getElementById('fluid-canvas');
  }
  setEnabled(v){
    this._enabled=!!v;
    this._canvas.style.display=v?'block':'none';
  }
  updateConfig(ns){
    this._canvas.style.opacity=(ns.fluid_opacity??80)/100;
    if(!window.fluidSim)return;
    window.fluidSim.updateConfig({
      CURL:ns.fluid_curl,
      DENSITY_DISSIPATION:ns.fluid_density_dissipation/10,
      VELOCITY_DISSIPATION:ns.fluid_velocity_dissipation/10,
      PRESSURE:ns.fluid_pressure/100,
      INTENSITY:(ns.fluid_color_strength??100)/100,
    });
  }
  splat(t,ns,W,H){
    if(!this._enabled||!window.fluidSim)return;
    const normX=t.x/W, normY=t.bottomY/H;
    // Per-splat scale: color_strength maps 0-200 → 0-0.30
    // Reinhard tonemapper in the display shader prevents solid saturation.
    const scale=(ns.fluid_color_strength??100)/100*0.15;
    const{r:cr,g:cg,b:cb}=ns.fluid_own_color
      ?{r:ns.fluid_own_r,g:ns.fluid_own_g,b:ns.fluid_own_b}
      :resolveNoteColor(t.note,t.channel,ns);
    const r=cr/255*scale, g=cg/255*scale, b=cb/255*scale;
    // Rise speed: 0.0030 ≈ 18 % canvas height per second at 100 %
    const velY=-(ns.fluid_intensity/100)*0.003;
    // Radius: 1-100 → 0.0002-0.010 (before aspect-ratio correction)
    const velRadius=Math.max(0.0002,(ns.fluid_splat_size??20)/100*0.010);
    window.fluidSim.addSplat(normX,normY,0,velY,r,g,b,velRadius,velRadius*1.4);
  }
}

// LED OUTPUT
// ═══════════════════════════════════════════════════════
class LedOutput{
  constructor(){this._ser=null;this._ble=null;this._char=null;this._writer=null;this.connected=false;this._lastMs=0;this._bright=new Float32Array(128);this._prevLit=new Uint8Array(128);this._sweepTimer=null;this._lastError='';this._reader=null;this._consoleCb=null;this._onError=null;this._gapUntil=new Float32Array(128);this._bleSending=false;}
  async connectSerial(){
    if(location.protocol!=='https:'&&location.hostname!=='localhost'&&location.hostname!=='127.0.0.1'){
      this._lastError='Requires HTTPS or localhost (current: '+location.protocol+'//'+location.hostname+')';return false;}
    if(!navigator.serial){this._lastError='Web Serial not available — use Chrome or Edge.';return false;}
    try{
      const p=await navigator.serial.requestPort();
      await p.open({baudRate:115200});
      this._ser=p; this._writer=p.writable.getWriter();
      this._reader=p.readable.getReader();
      const dec=new TextDecoder(); let partial='';
      (async()=>{
        try{while(true){const{value,done}=await this._reader.read();if(done)break;
          partial+=dec.decode(value,{stream:true});
          const lines=partial.split('\n');partial=lines.pop();
          for(const ln of lines)if(this._consoleCb)this._consoleCb(ln);
        }}catch(e){}
      })();
      this.connected=true; this._lastError=''; return true;
    }catch(e){this._lastError=e.message||String(e);return false;}
  }
  async connectBluetooth(svcUuid,charUuid){
    if(location.protocol!=='https:'&&location.hostname!=='localhost'&&location.hostname!=='127.0.0.1'){
      this._lastError='Requires HTTPS or localhost (current: '+location.protocol+'//'+location.hostname+')';return false;}
    if(!navigator.bluetooth){this._lastError='Web Bluetooth not available — use Chrome or Edge.';return false;}
    try{
      const dev=await navigator.bluetooth.requestDevice({acceptAllDevices:true,optionalServices:[svcUuid.toLowerCase()]});
      const srv=await dev.gatt.connect();
      const svc=await srv.getPrimaryService(svcUuid.toLowerCase());
      this._char=await svc.getCharacteristic(charUuid.toLowerCase());
      this.connected=true; this._lastError=''; return true;
    }catch(e){this._lastError=e.message||String(e);return false;}
  }
  disconnect(){
    this.stopSweep();
    this._consoleCb=null;
    if(this._reader){try{this._reader.cancel();}catch(e){} this._reader=null;}
    if(this._writer){try{this._writer.releaseLock();}catch(e){} this._writer=null;}
    if(this._ser){try{this._ser.close();}catch(e){} this._ser=null;}
    this._ble=null;this._char=null;this.connected=false;
  }
  reattack(notes,now){for(const n of notes)this._gapUntil[n]=now+50;}
  _send(enc){
    if(this._writer)this._writer.write(enc).catch(()=>{});
    else if(this._char)this._sendBle(enc);
  }
  async _sendBle(enc){
    if(this._bleSending)return; // drop frame — previous send still in flight
    this._bleSending=true;
    const CHUNK=200;
    for(let off=0;off<enc.length;off+=CHUNK){
      try{await this._char.writeValueWithoutResponse(enc.slice(off,off+CHUNK));}
      catch(e){
        const msg='BLE write: '+(e.message||String(e));
        this._lastError=msg;
        if(this._onError)this._onError(msg);
        this._bleSending=false;
        return;
      }
    }
    this._bleSending=false;
  }
  startSweep(lo){
    if(this._sweepTimer)this.stopSweep();
    const cnt=Math.max(1,lo.led_count||177);
    let i=0;
    this._sweepTimer=setInterval(()=>{
      const parts=['LEDS',cnt];
      for(let j=0;j<cnt;j++)parts.push(j===i?255:0,j===i?255:0,j===i?255:0);
      this._send(new TextEncoder().encode(parts.join(',')+'\n'));
      i=(i+1)%cnt;
    },80);
  }
  stopSweep(lo){
    clearInterval(this._sweepTimer); this._sweepTimer=null;
    if(this.connected){
      const cnt=Math.max(1,(lo&&lo.led_count)||177);
      const parts=['LEDS',cnt];
      for(let j=0;j<cnt*3;j++)parts.push(0);
      this._send(new TextEncoder().encode(parts.join(',')+'\n'));
    }
  }
  update(activeNotes,sustainedNotes,noteChannel,lo,ns,now){
    if(!this.connected||this._sweepTimer)return;
    const fps=Math.max(1,Math.min(60,lo.fps_limit||30));
    if(now-this._lastMs<1000/fps)return;
    const dt=Math.min(0.1,(now-this._lastMs)/1000);
    this._lastMs=now;
    const cnt=lo.led_count, mpk=lo.mirror_per_key||2;
    const fadeAmt=(lo.led_fade_amount||0)/100;
    const fadeEnabled=fadeAmt>0;
    const decay=fadeEnabled?Math.pow(Math.max(0,1-fadeAmt),dt*200/Math.max(1,lo.led_fade_speed||80)):0;
    for(let n=0;n<128;n++){
      const lit=(activeNotes.has(n)||(lo.led_sustain&&sustainedNotes&&sustainedNotes.has(n)))&&!(this._gapUntil[n]>now);
      if(lit){
        if(!this._prevLit[n])this._bright[n]=1.0; // new strike — reset to full
        else if(fadeEnabled)this._bright[n]=Math.max(0,this._bright[n]*decay); // decay while held
      }else{
        this._bright[n]=0; // released — cut immediately
      }
      this._prevLit[n]=lit?1:0;
    }
    const parts=['LEDS',cnt];
    for(let i=0;i<cnt;i++){
      const key=PIANO_FIRST+Math.floor(i/mpk);
      // Skip LEDs that map beyond the piano range — prevents off-piano MIDI notes from flickering edge LEDs
      if(key>PIANO_LAST){parts.push(0,0,0);continue;}
      const br=this._bright[key];
      if(br>0){
        const ch=noteChannel?.get(key)??0;
        const{r:nr,g:ng,b:nb}=resolveNoteColor(key,ch,ns);
        parts.push(Math.round(nr*br),Math.round(ng*br),Math.round(nb*br));
      }else{parts.push(0,0,0);}
    }
    this._send(new TextEncoder().encode(parts.join(',')+'\n'));
  }
}

// AUDIENCE COLOR CLIENT
// ═══════════════════════════════════════════════════════
class AudienceColorClient{
  constructor(){this._ws=null;this.connected=false;this._pending=[];this._colorStart=null;this._colorTarget=null;this._blendMs=0;this._blendElapsed=0;}
  connect(url){
    if(!url)return;
    try{
      this._ws=new WebSocket(url);
      this._ws.onopen=()=>{
        this.connected=true;
        this._ws.send(JSON.stringify({type:'identify',role:'visualizer'}));
      };
      this._ws.onclose=()=>{this.connected=false;};
      this._ws.onmessage=e=>{
        try{
          const m=JSON.parse(e.data);
          if(m.type==='color_set'&&m.rgb){
            this._pending.push({r:m.rgb.r||0,g:m.rgb.g||0,b:m.rgb.b||0,ms:m.transition_ms||220});
          } else if(m.type==='apply_change'){
            const cat=m.category;
            if(cat==='theme'){
              const t=BUILTIN_NOTE_THEMES[m.theme_index];
              if(t){Config.ns.note_colors=t.build();Config.data.active_note_theme={type:'builtin',index:m.theme_index};}
            } else if(cat==='color'){
              this._pending.push({r:m.r||0,g:m.g||0,b:m.b||0,ms:220});
              Config.ns.note_colors=null;
              Config.data.active_note_theme={type:'none'};
            } else if(cat==='speed'){
              Config.ns.speed_px_per_sec=m.speed_px_per_sec;
            } else if(cat==='effects'){
              Config.ns[`effect_${m.effect}_enabled`]=m.enabled?1:0;
            } else if(cat==='fluid'){
              const preset=BUILTIN_FLUID_THEMES[m.fluid_preset_index];
              if(preset){Object.assign(Config.ns,preset.params);Config.ns.effect_fluid_enabled=1;}
            } else if(cat==='performance'){
              const p=BUILTIN_PERFORMANCES[m.performance_index];
              if(p){
                const t=BUILTIN_NOTE_THEMES[p.noteThemeIndex];
                if(t){Config.ns.note_colors=t.build();Config.data.active_note_theme={type:'builtin',index:p.noteThemeIndex};}
                Config.ns.color_r=p.r;Config.ns.color_g=p.g;Config.ns.color_b=p.b;
                Config.ns.speed_px_per_sec=p.speed;
                Config.ns.effect_sparks_enabled=p.sparks;
                Config.ns.effect_smoke_enabled=p.smoke;
                Config.ns.effect_glow_enabled=p.glow;
                Config.ns.effect_fluid_enabled=p.fluid;
                Config.ns.effect_halo_pulse_enabled=p.halo;
                Config.ns.effect_moon_dust_enabled=p.moon;
                Config.ns.effect_press_smoke_enabled=p.pressMist;
                Config.ns.glow_strength_percent=p.glowStrength;
                Config.ds.background_color=p.bg;
              }
            }
          } else if(m.type==='poll_start'){
            window.app?._showToast?.(`Vote: ${m.label} — type 1–${m.options.length} on Kik`);
          } else if(m.type==='poll_end'){
            window.app?._showToast?.(m.winner_label?`Applied: ${m.winner_label}`:'Vote tied — no change');
          }
        }catch(ex){}
      };
    }catch(e){}
  }
  disconnect(){if(this._ws){this._ws.close();this._ws=null;}this.connected=false;}
  update(dt,ns){
    while(this._pending.length){
      const ev=this._pending.shift();
      this._colorStart=[ns.color_r,ns.color_g,ns.color_b];
      this._colorTarget=[ev.r,ev.g,ev.b];
      this._blendMs=Math.max(20,ev.ms); this._blendElapsed=0;
    }
    if(this._blendMs>0&&this._blendElapsed<this._blendMs){
      this._blendElapsed=Math.min(this._blendMs,this._blendElapsed+dt);
      const a=this._blendElapsed/this._blendMs, s=a*a*(3-2*a);
      ns.color_r=Math.max(0,Math.min(255,this._colorStart[0]+(this._colorTarget[0]-this._colorStart[0])*s|0));
      ns.color_g=Math.max(0,Math.min(255,this._colorStart[1]+(this._colorTarget[1]-this._colorStart[1])*s|0));
      ns.color_b=Math.max(0,Math.min(255,this._colorStart[2]+(this._colorTarget[2]-this._colorStart[2])*s|0));
    }
  }
}

const _KICK_COLORS={red:[255,0,0],green:[0,200,0],blue:[0,0,255],white:[255,255,255],black:[0,0,0],yellow:[255,255,0],orange:[255,140,0],purple:[128,0,128],pink:[255,105,180],cyan:[0,255,255],aqua:[0,255,255],magenta:[255,0,255],fuchsia:[255,0,255],lime:[0,255,0],teal:[0,128,128],navy:[0,0,128],maroon:[128,0,0],olive:[128,128,0],silver:[192,192,192],gray:[128,128,128],grey:[128,128,128],coral:[255,127,80],salmon:[250,128,114],tomato:[255,99,71],gold:[255,215,0],khaki:[240,230,140],turquoise:[64,224,208],violet:[238,130,238],indigo:[75,0,130],crimson:[220,20,60],chocolate:[210,105,30],tan:[210,180,140],lavender:[230,230,250],orchid:[218,112,214],plum:[221,160,221],hotpink:[255,105,180],deeppink:[255,20,147],lightblue:[173,216,230],skyblue:[135,206,235],steelblue:[70,130,180],royalblue:[65,105,225],dodgerblue:[30,144,255],lightgreen:[144,238,144],limegreen:[50,205,50],forestgreen:[34,139,34],darkgreen:[0,100,0],seagreen:[46,139,87],springgreen:[0,255,127],yellowgreen:[154,205,50],chartreuse:[127,255,0],neon:[57,255,20],mint:[62,255,186],rose:[255,0,127],amber:[255,191,0],electric:[0,255,255],fire:[255,69,0],ice:[160,220,255],sunset:[255,100,50]};

function _parseKickColor(arg){
  arg=arg.trim().toLowerCase();
  const h6=arg.match(/^#?([0-9a-f]{6})$/i);
  if(h6){const v=parseInt(h6[1],16);return[(v>>16)&255,(v>>8)&255,v&255];}
  const h3=arg.match(/^#?([0-9a-f])([0-9a-f])([0-9a-f])$/i);
  if(h3){return[parseInt(h3[1]+h3[1],16),parseInt(h3[2]+h3[2],16),parseInt(h3[3]+h3[3],16)];}
  const rgb=arg.match(/^(\d{1,3})[,\s]+(\d{1,3})[,\s]+(\d{1,3})$/);
  if(rgb){return[Math.min(255,+rgb[1]),Math.min(255,+rgb[2]),Math.min(255,+rgb[3])];}
  const key=arg.replace(/\s+/g,'');
  return _KICK_COLORS[key]||null;
}

class KickChatClient{
  constructor(){this._ws=null;this.connected=false;this._status='off';this._slug='';this._transMs=600;this._audience=null;}
  init(audience){this._audience=audience;}
  connect(slug,transMs){
    this.disconnect();
    slug=(slug||'').trim();
    if(!slug){this._setStatus('off');return;}
    this._slug=slug.toLowerCase();
    this._transMs=transMs||600;
    this._setStatus('connecting…');
    fetch(`https://kick.com/api/v1/channels/${this._slug}`)
      .then(r=>r.json())
      .then(d=>{
        const id=d&&d.chatroom&&d.chatroom.id;
        if(!id)throw new Error('channel not found');
        this._openWS(id);
      })
      .catch(e=>{this._setStatus('error: '+e.message);});
  }
  _openWS(chatroomId){
    const url='wss://ws-us2.pusher.com/app/32cbd69e4b950bf97679?protocol=7&client=js&version=7.0.3&flash=false';
    try{
      this._ws=new WebSocket(url);
      this._ws.onopen=()=>{
        this._ws.send(JSON.stringify({event:'pusher:subscribe',data:{auth:'',channel:`chatrooms.${chatroomId}.v2`}}));
      };
      this._ws.onmessage=e=>{
        try{
          const msg=JSON.parse(e.data);
          if(msg.event==='pusher:ping'){this._ws.send(JSON.stringify({event:'pusher:pong',data:{}}));return;}
          if(msg.event==='pusher_internal:subscription_succeeded'){this.connected=true;this._setStatus('connected');}
          if(msg.event==='App\\Events\\ChatMessageEvent'){
            const d=typeof msg.data==='string'?JSON.parse(msg.data):msg.data;
            const text=(d&&d.content)||'';
            const m=text.match(/^!(colou?r|lights?|led)\s+(.+)$/i);
            if(m){
              const col=_parseKickColor(m[2]);
              if(col&&this._audience){
                this._audience._pending.push({r:col[0],g:col[1],b:col[2],ms:this._transMs});
              }
            }
          }
        }catch(ex){}
      };
      this._ws.onclose=()=>{this.connected=false;this._setStatus('disconnected');};
      this._ws.onerror=()=>{this.connected=false;this._setStatus('error: ws failed');};
    }catch(e){this._setStatus('error: '+e.message);}
  }
  disconnect(){if(this._ws){this._ws.close();this._ws=null;}this.connected=false;this._setStatus('off');}
  _setStatus(s){
    this._status=s;
    const el=document.querySelector('#kick-status');
    if(el)el.textContent=s.charAt(0).toUpperCase()+s.slice(1);
  }
}

function hsvToRgb(h,s,v){
  const i=Math.floor(h*6),f=h*6-i;
  const p=v*(1-s),q=v*(1-f*s),t2=v*(1-(1-f)*s);
  const m=[[v,t2,p],[q,v,p],[p,v,t2],[p,q,v],[t2,p,v],[v,p,q]][i%6];
  return{r:Math.round(m[0]*255),g:Math.round(m[1]*255),b:Math.round(m[2]*255)};
}
function _buildRainbow(){return Array.from({length:128},(_,n)=>hsvToRgb(((n-21)/87%1+1)%1,0.9,1.0));}
function _buildOctave(){return Array.from({length:128},(_,n)=>hsvToRgb((n%12)/12,0.9,1.0));}
function _buildFire(){return Array.from({length:128},(_,n)=>{const t=Math.max(0,Math.min(1,(n-21)/87));return{r:255,g:Math.round(t*200),b:0};});}
function _buildIce(){return Array.from({length:128},(_,n)=>{const t=Math.max(0,Math.min(1,(n-21)/87));return{r:0,g:Math.round(180+t*75),b:255};});}
function _buildSunset(){return Array.from({length:128},(_,n)=>{const t=Math.max(0,Math.min(1,(n-21)/87));return hsvToRgb(0.04+t*0.18,0.95,1.0);});}
function _buildRidersOnTheStorm(){return Array.from({length:128},(_,n)=>n<=59?{r:255,g:255,b:255}:{r:160,g:0,b:255});}
function _buildMoonlightSonata(){return Array.from({length:128},(_,n)=>{const t=Math.max(0,Math.min(1,(n-21)/87));return{r:Math.round(20+t*175),g:Math.round(15+t*200),b:Math.round(120+t*135)};});}
function _buildLightMyFire(){return Array.from({length:128},(_,n)=>{const t=Math.max(0,Math.min(1,(n-21)/87));return{r:Math.round(200+t*55),g:Math.round(t*180),b:0};});}
function _buildThunderLightning(){return Array.from({length:128},(_,n)=>{if(n<=59){const t=Math.max(0,Math.min(1,(n-21)/38));return hsvToRgb(0.63+t*0.08,0.95,0.55+t*0.2);}else{const t=Math.max(0,Math.min(1,(n-60)/48));return hsvToRgb(0.53-t*0.03,0.85-t*0.6,0.7+t*0.3);}});}
function _buildHeadlightsRain(){return Array.from({length:128},(_,n)=>{if(n<=59){const t=Math.max(0,Math.min(1,(n-21)/38));return hsvToRgb(0.0,0.92,0.45+t*0.45);}else{const t=Math.max(0,Math.min(1,(n-60)/48));return hsvToRgb(0.6,0.7-t*0.55,0.55+t*0.45);}});}
function _buildWetNeon(){return Array.from({length:128},(_,n)=>{if(n<=59){const t=Math.max(0,Math.min(1,(n-21)/38));return hsvToRgb(0.78-t*0.11,0.88,0.5+t*0.4);}else{const t=Math.max(0,Math.min(1,(n-60)/48));return hsvToRgb(0.47-t*0.08,0.95-t*0.2,0.45+t*0.55);}});}
function _buildOceanTrench(){return Array.from({length:128},(_,n)=>{if(n<=59){const t=Math.max(0,Math.min(1,(n-21)/38));return hsvToRgb(0.68,0.98,0.15+t*0.3);}else{const t=Math.max(0,Math.min(1,(n-60)/48));return hsvToRgb(0.49-t*0.04,0.9-t*0.3,0.4+t*0.5);}});}

function resolveNoteColor(note,channel,ns){
  const nc=ns.note_colors;
  const fallback={r:ns.color_r,g:ns.color_g,b:ns.color_b};
  if(!nc)return fallback;
  // Backward compat: plain Array(128) from saved themes / built-in themes
  if(Array.isArray(nc))return nc[note]||fallback;
  const{notes,channelColors,zones}=nc;
  const ch=channel??0;
  // Priority 1: zone (channel + pitch range)
  for(let i=0;i<zones.length;i++){const z=zones[i];if(z.ch===ch&&note>=z.lo&&note<=z.hi)return{r:z.r,g:z.g,b:z.b};}
  // Priority 2: channel
  const cc=channelColors[ch];if(cc)return cc;
  // Priority 3: per-note
  if(notes&&notes[note])return notes[note];
  return fallback;
}

EXECUTION: The script runs as new Function('api', code)(api) in a browser.
No imports, no fetch, no require — plain ES2020 browser JS only.
Return value is ignored; interact only through the api object.

API REFERENCE:
  api.setNote(n, r, g, b)        n=0-127 MIDI note; r/g/b=0-255; pass null for r to clear

  api.onNoteOff(fn)   fn(note, channel)             fired on note release

                      activeNotes = Set of active MIDI note numbers
                      now = performance.now() in ms
                      dt = seconds since last frame

MIDI NOTE NUMBERS: A0=21  C4=60 (middle C)  A4=69  C8=108  piano range 21-108

\`\`\`

Respond with ONLY the JavaScript code, no markdown fences, no explanation.

YOUR REQUEST:
[describe the colour effect you want here]`;
}

function runUserScript(code){
  const notes=new Array(128).fill(null);
  const channelColors=new Array(16).fill(null);
  const zones=[];
  let _onNoteOn=null,_onNoteOff=null,_onFrame=null;
  const api={
    setNote(n,r,g,b){if(n>=0&&n<128)notes[n]=r==null?null:{r:r|0,g:g|0,b:b|0};},
    setOctave(oct,r,g,b){for(let n=((oct%12)+12)%12;n<128;n+=12)notes[n]={r:r|0,g:g|0,b:b|0};},
    setAll(r,g,b){for(let n=0;n<128;n++)notes[n]={r:r|0,g:g|0,b:b|0};},
    setChannel(ch,r,g,b){if(ch>=0&&ch<16)channelColors[ch]={r:r|0,g:g|0,b:b|0};},
    setZone(ch,lo,hi,r,g,b){zones.push({ch:ch|0,lo:lo|0,hi:hi|0,r:r|0,g:g|0,b:b|0});},
    hsvToRgb,
    onNoteOn(fn){_onNoteOn=fn;},
    onNoteOff(fn){_onNoteOff=fn;},
    onFrame(fn){_onFrame=fn;},
  };
  try{new Function('api',code)(api);return{notes,channelColors,zones,_onNoteOn,_onNoteOff,_onFrame};}
  catch(e){alert('Script error: '+e.message);return null;}
}

let _saveTimer=null;
function schedSave(){clearTimeout(_saveTimer);_saveTimer=setTimeout(()=>Config.save(),300);}

function wireNoteThemeDropdown(root,prefix,refreshAll){
  const sel=root.querySelector(`#${prefix}-nc-sel`);
  const delBtn=root.querySelector(`#${prefix}-nc-del`);
  const scriptDiv=root.querySelector(`#${prefix}-nc-script`);
  const ta=root.querySelector(`#${prefix}-nc-ta`);
  const runBtn=root.querySelector(`#${prefix}-nc-run`);
  const saveasBtn=root.querySelector(`#${prefix}-nc-saveas`);
  if(!sel)return ()=>{};

  function refresh(){
    const ant=Config.data.active_note_theme||{type:'builtin',index:0};
    sel.innerHTML='';
    const bGrp=document.createElement('optgroup'); bGrp.label='Built-in';
    BUILTIN_NOTE_THEMES.forEach((t,i)=>{
      const opt=document.createElement('option'); opt.value=`b${i}`; opt.textContent=t.name; bGrp.appendChild(opt);
    });
    sel.appendChild(bGrp);
    const userThemes=NoteColorThemeManager.getAll();
    if(userThemes.length){
      const uGrp=document.createElement('optgroup'); uGrp.label='My Themes';
      userThemes.forEach((t,i)=>{
        const opt=document.createElement('option'); opt.value=`u${i}`; opt.textContent=t.name; uGrp.appendChild(opt);
      });
      sel.appendChild(uGrp);
    }
    sel.value=(ant.type==='user')?`u${ant.index}`:`b${ant.index}`;
    updateUI();
  }

  function updateUI(){
    const v=sel.value||'b0';
    const isUser=v.startsWith('u');
    if(delBtn)delBtn.style.display=isUser?'':'none';
    const isSolid=v==='b0';
    scriptDiv.style.display=isSolid?'none':'';
    if(isUser){
      const i=+v.slice(1), t=NoteColorThemeManager.getAll()[i];
      ta.value=t?t.script||'':'';
    } else {
      const i=+v.slice(1);
      ta.value=BUILTIN_NOTE_THEMES[i]?.script||'';
    }
    ta.readOnly=false; ta.style.opacity='1';
  }

  function applyTheme(v){
    if(v.startsWith('b')){
      const i=+v.slice(1), theme=BUILTIN_NOTE_THEMES[i]; if(!theme)return;
      Config.ns.color_mode=theme.mode;
      Config.ns.note_colors=theme.build();
      Config.data.active_note_theme={type:'builtin',index:i};
    } else {
      const i=+v.slice(1);
      NoteColorThemeManager.load(i);
      Config.data.active_note_theme={type:'user',index:i};
    }
    Config.save();
  }

  sel.addEventListener('change',()=>{ applyTheme(sel.value); updateUI(); refreshAll(); });

  if(runBtn) runBtn.addEventListener('click',()=>{
    const colors=runUserScript(ta.value); if(!colors)return;
    Config.ns.note_colors=colors;
    Config.ns.user_script=ta.value;
    Config.ns.color_mode='script';
    const v=sel.value;
    if(v.startsWith('u')){
      const i=+v.slice(1), themes=NoteColorThemeManager.getAll();
      if(themes[i]){themes[i].colors=colors; themes[i].script=ta.value;}
    }
    Config.save();
  });

  if(saveasBtn) saveasBtn.addEventListener('click',()=>{
    const name=prompt('Theme name:'); if(!name)return;
    const colors=runUserScript(ta.value); if(!colors)return;
    Config.ns.note_colors=colors; Config.ns.user_script=ta.value;
    NoteColorThemeManager.save(name);
    const i=NoteColorThemeManager.getAll().length-1;
    Config.data.active_note_theme={type:'user',index:i};
    Config.save();
    refreshAll();
  });

  const copyPromptBtn=root.querySelector(`#${prefix}-nc-copy-prompt`);
  if(copyPromptBtn) copyPromptBtn.addEventListener('click',()=>{
    const prompt=buildScriptPrompt(ta.value.trim());
    navigator.clipboard.writeText(prompt).then(()=>{
      if(window.app?._showToast)app._showToast('AI prompt copied to clipboard');
    });
  });

  if(delBtn) delBtn.addEventListener('click',()=>{
    const v=sel.value; if(!v.startsWith('u'))return;
    const i=+v.slice(1), t=NoteColorThemeManager.getAll()[i];
    if(!t||!confirm(`Delete "${t.name}"?`))return;
    NoteColorThemeManager.delete(i);
    Config.data.active_note_theme={type:'builtin',index:0};
    Config.ns.color_mode='solid'; Config.ns.note_colors=null;
    Config.save();
    refreshAll();
  });

  refresh();
  return refresh;
}

function wireFluidPresets(root,app){
  const sel=root.querySelector('#fluid-preset-sel');
  const delBtn=root.querySelector('#fluid-preset-del');
  const saveBtn=root.querySelector('#fluid-preset-save');
  if(!sel)return;
  function renderOpts(){
    sel.innerHTML='';
    [...BUILTIN_FLUID_THEMES,...FluidThemeManager.getAll()].forEach((t,i)=>{
      const o=document.createElement('option');
      o.value=i; o.textContent=t.name;
      if(i>=BUILTIN_FLUID_THEMES.length)o.dataset.user='1';
      sel.appendChild(o);
    });
    if(delBtn)delBtn.style.display=sel.options[sel.selectedIndex]?.dataset.user==='1'?'':'none';
  }
  renderOpts();
  sel.addEventListener('change',()=>{
    const i=+sel.value;
    const all=[...BUILTIN_FLUID_THEMES,...FluidThemeManager.getAll()];
    if(all[i])FluidThemeManager.apply(all[i].params,app);
    const ns=Config.ns;
    _FLUID_PRESET_KEYS.forEach(k=>{
      const sl=root.querySelector(`input[data-cfk="${k}"]`);
      if(sl){sl.value=ns[k];const ve=root.querySelector(`#v-${sl.id}`);if(ve)ve.textContent=ns[k];}
    });
    if(delBtn)delBtn.style.display=sel.options[sel.selectedIndex]?.dataset.user==='1'?'':'none';
  });
  if(saveBtn) saveBtn.addEventListener('click',()=>{
    const name=prompt('Preset name:','');
    if(!name||!name.trim())return;
    FluidThemeManager.save(name.trim());
    renderOpts();
    sel.value=BUILTIN_FLUID_THEMES.length+FluidThemeManager.getAll().length-1;
    if(delBtn)delBtn.style.display='';
  });
  if(delBtn) delBtn.addEventListener('click',()=>{
    const i=+sel.value-BUILTIN_FLUID_THEMES.length;
    if(i<0)return;
    FluidThemeManager.delete(i);
    renderOpts();
  });
}

function wireProfiles(root){
  const list=root.querySelector('#profile-list');
  const nameInp=root.querySelector('#profile-name-inp');
  const saveBtn=root.querySelector('#btn-profile-save');
  if(!list)return;

  function renderProfiles(){
    const profiles=Config.data.profiles||[];
    if(!profiles.length){list.innerHTML='<p style="font-size:12px;color:var(--muted)">No profiles saved yet.</p>';return;}
    list.innerHTML=profiles.map((p,i)=>`
      <div style="display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--border)">
        <span style="flex:1;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${p.name}</span>
        <span style="font-size:11px;color:var(--muted)">${p.date||''}</span>
        <button class="action-btn" data-pi="${i}" data-act="load" style="padding:3px 10px;font-size:11px">Load</button>
        <button class="action-btn" data-pi="${i}" data-act="del" style="padding:3px 10px;font-size:11px;color:#dc8c8c;border-color:#7a3a3a">Del</button>
      </div>`).join('');
    list.querySelectorAll('[data-act]').forEach(btn=>{
      btn.addEventListener('click',()=>{
        const i=+btn.dataset.pi;
        if(btn.dataset.act==='load'){
          const snap=Config.data.profiles[i]?.data;
          if(!snap)return;
          const merged=Config._merge(JSON.parse(JSON.stringify(Config._d)),snap);
          merged.profiles=Config.data.profiles;
          Config.data=merged;
          Config.save();
          location.reload();
        } else {
          Config.data.profiles.splice(i,1);
          Config.save();
          renderProfiles();
        }
      });
    });
  }

  if(saveBtn) saveBtn.addEventListener('click',()=>{
    const name=(nameInp?.value||'').trim();
    if(!name)return;
    if(!Config.data.profiles)Config.data.profiles=[];
    const snap=JSON.parse(JSON.stringify(Config.data));
    delete snap.profiles;
    const d=new Date();
    Config.data.profiles.push({name,date:d.toLocaleDateString(),data:snap});
    Config.save();
    if(nameInp)nameInp.value='';
    renderProfiles();
  });

  renderProfiles();
}

function wireSettings(root, app){
  // Range sliders
  root.querySelectorAll('input[type=range][data-cfg]').forEach(el=>{
    el.addEventListener('input',()=>{
      const v=+el.value, cfg=el.dataset.cfg, k=el.dataset.cfk;
      if(cfg==='ns')Config.ns[k]=v; else if(cfg==='ks'){Config.ks[k]=v; app.rebuildLayout=true;}
      const ve=root.querySelector(`#v-${el.id}`)||root.querySelector(`[id="v-${el.id}"]`);
      if(ve)ve.textContent=v;
      // Update colour pickers if RGB
      const ns=Config.ns;
      if(['color_r','color_g','color_b'].includes(k)){
        const cp=root.querySelector('#cp-outer'); if(cp)cp.value=hex(ns.color_r,ns.color_g,ns.color_b);
      }
      if(['interior_r','interior_g','interior_b'].includes(k)){
        const cp=root.querySelector('#cp-inner'); if(cp)cp.value=hex(ns.interior_r,ns.interior_g,ns.interior_b);

  const cpBg=root.querySelector('#cp-bg');

  if(ledTrans) ledTrans.addEventListener('change',()=>{Config.lo.transport=ledTrans.value;schedSave();});
  const ledCnt=root.querySelector('#led-count');

  const ledFps=root.querySelector('#led-fps');

      ledConsoleEl.scrollTop=ledConsoleEl.scrollHeight;

  if(btnConsoleClear)btnConsoleClear.addEventListener('click',()=>{if(ledConsoleEl)ledConsoleEl.textContent='';});

  // Themes

  // Export / Import save file
  const btnExport=root.querySelector('#btn-cfg-export');
  if(btnExport) btnExport.addEventListener('click',()=>{
    const json=JSON.stringify(Config.data,null,2);

    const a=document.createElement('a');
    const d=new Date();
    a.href=url;
    a.download='piano-vis-'+d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')+'.json';
    a.click();
    URL.revokeObjectURL(url);
  });
  const inpImport=root.querySelector('#inp-cfg-import');
  if(inpImport) inpImport.addEventListener('change',e=>{
    const f=e.target.files[0]; if(!f)return;
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const loaded=JSON.parse(ev.target.result);
        // Deep-merge loaded data onto defaults so missing keys get filled
        Config.data=Config._merge(JSON.parse(JSON.stringify(Config._d)),loaded);
        Config.save();
        location.reload();
      }catch(err){alert('Invalid save file: '+err.message);}
    };
    reader.readAsText(f);
  });
  // Note color theme dropdowns (Notes / Effects / Fluid tabs share the same system)
  const ncRefreshers=[];
  function refreshAllNcDropdowns(){ncRefreshers.forEach(fn=>fn());}
  ['notes','effects','fluid'].forEach(p=>{
    ncRefreshers.push(wireNoteThemeDropdown(root,p,refreshAllNcDropdowns));
  });
}

function updateLedStatus(root,app){
  const dot=root.querySelector('#led-status-dot');
  const txt=root.querySelector('#led-status-txt');
  const diag=root.querySelector('#led-diag');
  if(dot)dot.classList.toggle('connected',app.led.connected);
  if(txt)txt.textContent=app.led.connected?'Connected':'Disconnected';
  if(diag){
    if(app.led.connected){diag.textContent='';}
    else{
      const t=Config.lo.transport;
      if(t==='serial'&&!navigator.serial) diag.textContent='Web Serial not available — use Chrome/Edge over HTTPS';
      else if(t==='bluetooth'&&!navigator.bluetooth) diag.textContent='Web Bluetooth not available — use Chrome/Edge over HTTPS';
      else diag.textContent=app.led._lastError||'';
    }
  }
}
function updateAudStatus(root,app){
  const el=root.querySelector('#aud-status'); if(el)el.textContent=app.audience.connected?'Connected':'Disconnected';
}
function refreshThemeGrid(root){
  const grid=root.querySelector('#theme-grid'); if(!grid)return;
  grid.innerHTML='';
  const themes=ThemeManager.getAll();
  if(!themes.length){grid.innerHTML='<span style="color:var(--muted);font-size:12px;font-style:italic">No themes saved.</span>';return;}
  themes.forEach((t,i)=>{
    const btn=document.createElement('button');
    btn.className='theme-btn'+(i===Config.data.active_user_theme_index?' active':'');
    btn.textContent=t.name||`Theme ${i+1}`;
    btn.onclick=()=>{ThemeManager.load(i);refreshThemeGrid(root);};
    const del=document.createElement('span');
    del.textContent=' ×'; del.style.cssText='cursor:pointer;color:var(--muted);font-size:11px';
    del.onclick=e=>{e.stopPropagation();if(confirm(`Delete "${t.name}"?`)){ThemeManager.delete(i);refreshThemeGrid(root);}};
    btn.appendChild(del); grid.appendChild(btn);
  });
}

function buildPanel(container, tabBar, tabs, app){
  // Build tab bar
  tabBar.innerHTML=tabs.map(t=>`<button data-t="${t.id}"${t.active?' class="active"':''}>${t.label}</button>`).join('');
  // Build panels
  container.innerHTML=tabs.map(t=>`<div class="tab-panel${t.active?' active':''}" id="tp-${t.id}">${buildSettingsHTML(t.id)}</div>`).join('');
  // Tab switching
  tabBar.querySelectorAll('button').forEach(btn=>{
    btn.addEventListener('click',()=>{
      tabBar.querySelectorAll('button').forEach(b=>b.classList.remove('active'));
      container.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
      btn.classList.add('active');
      const p=container.querySelector(`#tp-${btn.dataset.t}`); if(p)p.classList.add('active');
    });
  });
  wireSettings(container,app);
}

// AUDIO SYNTH
// ═══════════════════════════════════════════════════════
class AudioSynth{
  constructor(){this._ctx=null;this._active=new Map();}
  _ac(){
    if(!this._ctx)this._ctx=new(window.AudioContext||window.webkitAudioContext)();
    if(this._ctx.state==='suspended')this._ctx.resume();
    return this._ctx;
  }
  noteOn(note){
    const ac=this._ac();
    this.noteOff(note);
    const freq=440*Math.pow(2,(note-69)/12);
    const gain=ac.createGain();
    gain.connect(ac.destination);
    gain.gain.setValueAtTime(0,ac.currentTime);
    gain.gain.linearRampToValueAtTime(0.18,ac.currentTime+0.006);
    gain.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+2.0);
    const o1=ac.createOscillator(),o2=ac.createOscillator();
    o1.type='triangle';o1.frequency.value=freq;
    o2.type='triangle';o2.frequency.value=freq*2;
    const g2=ac.createGain();g2.gain.value=0.25;o2.connect(g2);g2.connect(gain);
    o1.connect(gain);
    o1.start();o2.start();
    o1.stop(ac.currentTime+2.0);o2.stop(ac.currentTime+2.0);
    this._active.set(note,{gain});
  }
  noteOff(note){
    const n=this._active.get(note);if(!n)return;
    const{gain}=n,ac=this._ctx;
    gain.gain.cancelScheduledValues(ac.currentTime);
    gain.gain.setValueAtTime(gain.gain.value,ac.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+0.08);
    this._active.delete(note);
  }
}
