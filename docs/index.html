class App{
  constructor(){
    this.mainCanvas=document.getElementById('main-canvas');
    this.ctx=this.mainCanvas.getContext('2d');
    this.bgCanvas=document.getElementById('bg-canvas'); // kept for compat; not drawn on
    this.bgCtx=null;
    this._bgA=document.getElementById('bg-slide-a');
    this._bgB=document.getElementById('bg-slide-b');
    this._bgGifCanvasA=document.createElement('canvas');
    this._bgGifCanvasB=document.createElement('canvas');
    [this._bgGifCanvasA,this._bgGifCanvasB].forEach(c=>{
      c.style.position='absolute';
      c.style.inset='0';
      c.style.width='100%';
      c.style.height='100%';
      c.style.pointerEvents='none';
      c.style.display='none';
    });
    this._bgA.appendChild(this._bgGifCanvasA);
    this._bgB.appendChild(this._bgGifCanvasB);
    this._bgGifCtxA=this._bgGifCanvasA.getContext('2d');
    this._bgGifCtxB=this._bgGifCanvasB.getContext('2d');
    this._bgGifRaf=0;
    this._bgLayerState={
      a:{mode:'css',entry:null,frames:null,durations:null,frameIdx:0,frameMs:0,lastTs:0,token:0},
      b:{mode:'css',entry:null,frames:null,durations:null,frameIdx:0,frameMs:0,lastTs:0,token:0},
    };
    this._bgFront='a';
    this._bgSlideIdx=0;
    this._bgSlideTimer=null;
    this._bgLastColor='';
    this.layout=null;
    this.trails=new TrailManager();
    this.fx=null;
    this.midi=new MidiHandler();
    this.midiFile=new MidiFilePlayer();
    this.fluid=new FluidController();
    this.led=new LedOutput();
    this.audience=new AudienceColorClient();
    this.kickChat=new KickChatClient();
    this.kickChat.init(this.audience);
    this._synth=new AudioSynth();
    this.prevNotes=new Set();
    this._activeNotes=new Set();  // swap buffer — never allocate in frame loop
    this._newly=[];               // reused arrays — no per-frame allocation
    this._released=[];
    this._pendingRestart=new Set();
    this._channelConfig=null;     // Array(16) set by track config screen
    this.smoothedDt=16.67;
    this.lastTime=0;
    this.fpsTime=0; this.fpsCount=0; this.fps=0;
    this.rebuildLayout=false;
    this._bgImages=[];   // [{url:string, name:string, isGif:bool}]
    this._mode='freeplay'; // 'freeplay' or 'file'
    this._vizActive=false;
    this._panelOpen=false;
    this._selectedPortId='keyboard';
    this._saveTimer=null;
    this._boundFrame=null;
    // Cached HUD element refs — avoid getElementById every frame
    this._hudFps=document.getElementById('hud-fps');
    this._hudSong=document.getElementById('hud-song');
    this._hudDevice=document.getElementById('hud-device');
    this._hudNotes=document.getElementById('hud-notes');
  }

  async start(){
    this._resize();
    window.addEventListener('resize',()=>this._resize());
    this._setupScreens();
    this._setupHUD();
    try{this._buildSettingsScreens();}catch(e){console.error('Settings build error:',e);}
    document.getElementById('main-canvas').addEventListener('keydown',e=>{if(e.key==='Escape')this.showMenu();});
    this._setupKeyboardMouse();
    // Apply saved fluid state immediately (setEnabled / updateConfig are normally
    // only called on user interaction, so saved settings would otherwise be ignored)
    this.fluid.setEnabled(Config.ns.effect_fluid_enabled);
    this.fluid.updateConfig(Config.ns);
    // Apply active built-in note theme if note_colors wasn't persisted (e.g. after preset import)
    if(!Config.ns.note_colors){
      const ant=Config.data.active_note_theme||{type:'builtin',index:0};
      if(ant.type==='builtin'){const t=BUILTIN_NOTE_THEMES[ant.index];if(t)Config.ns.note_colors=t.build();}
    }
    if(Config.kc.channel_slug)this.kickChat.connect(Config.kc.channel_slug,Config.kc.transition_ms);
    this._boundFrame=this._frame.bind(this);
    requestAnimationFrame(this._boundFrame);
  }

  _frame(now){
    requestAnimationFrame(this._boundFrame);
    const rawDt=now-this.lastTime; this.lastTime=now;
    const dt=Math.max(1,Math.min(33,rawDt));
    this.smoothedDt=this.smoothedDt*.85+dt*.15;
    this.fpsCount++; if(now-this.fpsTime>=1000){this.fps=this.fpsCount;this.fpsCount=0;this.fpsTime=now;this._hudFps.textContent=this.fps+' fps';}
    if(this.rebuildLayout){this.layout=buildLayout(this.mainCanvas.width,this.mainCanvas.height,Config.ks.height_percent,Config.ks.width_percent??100);this.rebuildLayout=false;}
    if(this._vizActive)this._update(dt);
    this._draw();
  }

  _update(dt){
    const ns=Config.ns, ks=Config.ks;
    // Audience color
    this.audience.update(dt,ns);
    // Reuse pre-allocated Set — clear and refill in place (zero allocation)
    const activeNotes=this._activeNotes;
    activeNotes.clear();
    if(this._mode==='file'){
      this.midiFile.update();
      for(const n of this.midiFile.activeNotes) activeNotes.add(n);
      this._hudSong.textContent=this.midiFile.filename+(this.midiFile.playing?' ▶':'');
    }else{
      for(const n of this.midi.activeNotes) activeNotes.add(n);
    }
    // LED
    const src=this._mode==='file'?this.midiFile:this.midi;
    this.led.update(activeNotes,this._mode==='file'?null:this.midi.sustainedNotes,src.noteChannel,Config.lo,ns,this.lastTime);
    // Trails — compute diff with pre-allocated arrays, no Set spreads
    const W=this.mainCanvas.width,H=this.mainCanvas.height;
    const newly=this._newly; newly.length=0;
    const released=this._released; released.length=0;
    for(const n of activeNotes) if(!this.prevNotes.has(n)) newly.push(n);
    for(const n of this.prevNotes) if(!activeNotes.has(n)) released.push(n);
    for(const n of this._pendingRestart){
      if(activeNotes.has(n)){
        const src=this._mode==='file'?this.midiFile:this.midi;
        const t=this.trails.start(n,src.noteChannel.get(n)??0,this.layout,ns,ks,H);
        if(t&&ns.effect_fluid_enabled)this.fluid.splat(t,ns,W,H);
      }
    }
    this._pendingRestart.clear();
    for(const n of this.midi.reattackedNotes){
      if(this.trails.active.has(n)){this.trails.release(n,ns);this._pendingRestart.add(n);}
    }
    this.led.reattack(this.midi.reattackedNotes,this.lastTime);
    this.midi.reattackedNotes.clear();
    const nc=ns.note_colors;
    if(nc&&typeof nc==='object'&&!Array.isArray(nc)){
      const src=this._mode==='file'?this.midiFile:this.midi;
      if(nc._onNoteOn)for(let i=0;i<newly.length;i++){try{nc._onNoteOn(newly[i],src.noteVelocity?.get(newly[i])??127,src.noteChannel.get(newly[i])??0);}catch(e){}}
      if(nc._onNoteOff)for(let i=0;i<released.length;i++){try{nc._onNoteOff(released[i],src.noteChannel.get(released[i])??0);}catch(e){}}
      if(nc._onFrame)try{nc._onFrame(activeNotes,this.lastTime,dt/1000);}catch(e){}
    }
    for(let i=0;i<newly.length;i++){
      const ni=newly[i];
      const src=this._mode==='file'?this.midiFile:this.midi;
      const ch=src.noteChannel.get(ni)??0;
      if(this._mode==='file'&&this._channelConfig?.[ch]?.muted)continue;
      const t=this.trails.start(ni,ch,this.layout,ns,ks,H);
      if(t&&ns.effect_fluid_enabled)this.fluid.splat(t,ns,W,H);
    }
    for(let i=0;i<released.length;i++) this.trails.release(released[i],ns);
    for(const n of activeNotes){
      this.trails.anchor(n,this.layout,ns,ks,H);
      const t=this.trails.active.get(n);
      if(t&&ns.effect_fluid_enabled)this.fluid.splat(t,ns,W,H);
    }
    // Swap buffers so prevNotes holds current notes, _activeNotes gets old buffer for next frame
    this._activeNotes=this.prevNotes;
    this.prevNotes=activeNotes;
    this.trails.update(this.smoothedDt,ns);
    // HUD
    if(this._mode==='freeplay') this._hudDevice.textContent=this.midi.portName||'No device';
    this._hudNotes.textContent=activeNotes.size+' notes';
  }

  _draw(){
    const W=this.mainCanvas.width,H=this.mainCanvas.height;
    const ctx=this.ctx;
    // Background colour — CSS div handles images/GIFs; just keep colour in sync
    const bgColor=Config.ds.background_color||'#0f0f14';
    if(this._bgLastColor!==bgColor){
      this._bgLastColor=bgColor;
      this._bgA.style.backgroundColor=bgColor;
      this._bgB.style.backgroundColor=bgColor;
    }
    ctx.clearRect(0,0,W,H);
    if(!this._vizActive||!this.layout){return;}
    const ns=Config.ns;
    this.fx.beginFrame(this.smoothedDt);
    for(const t of this.trails.all){
      this.trails.interp(t,this.smoothedDt);
      this.fx.drawTrail(ctx,t,ns);
    }
    this.fx.endFrame(ctx);
    drawPiano(ctx,this.layout,this.prevNotes,Config.ks);
  }

  _setupKeyboardMouse(){
    const canvas=this.mainCanvas;
    let _mouseNote=null;
    const toCanvas=e=>{
      const r=canvas.getBoundingClientRect();
      return{x:(e.clientX-r.left)*canvas.width/r.width,y:(e.clientY-r.top)*canvas.height/r.height};
    };
    const hitTest=(cx,cy)=>{
      if(!this.layout)return null;
      const{bkeys,wkeys,pianoY}=this.layout;
      if(cy<pianoY)return null;
      for(const[n,k]of bkeys)if(cx>=k.x&&cx<k.x+k.w&&cy>=k.y&&cy<k.y+k.h)return n;
      for(const[n,k]of wkeys)if(cx>=k.x&&cx<k.x+k.w&&cy>=k.y&&cy<k.y+k.h)return n;
      return null;
    };
    canvas.addEventListener('pointerdown',e=>{
      const{x,y}=toCanvas(e);
      const note=hitTest(x,y);
      if(note==null)return;
      if(_mouseNote!=null){this.midi.activeNotes.delete(_mouseNote);this._synth.noteOff(_mouseNote);}
      _mouseNote=note;
      this.midi.activeNotes.add(note);
      this._synth.noteOn(note);
      canvas.setPointerCapture(e.pointerId);
    });
    canvas.addEventListener('pointermove',e=>{
      if(_mouseNote==null)return;
      const{x,y}=toCanvas(e);
      const note=hitTest(x,y);
      if(note===_mouseNote)return;
      if(_mouseNote!=null){this.midi.activeNotes.delete(_mouseNote);this._synth.noteOff(_mouseNote);}
      _mouseNote=note;
      if(note!=null){this.midi.activeNotes.add(note);this._synth.noteOn(note);}
    });
    const release=()=>{
      if(_mouseNote!=null){this.midi.activeNotes.delete(_mouseNote);this._synth.noteOff(_mouseNote);_mouseNote=null;}
    };
    canvas.addEventListener('pointerup',release);
    canvas.addEventListener('pointercancel',release);
  }

  _resize(){
    const W=window.innerWidth,H=window.innerHeight;
    this.mainCanvas.width=W; this.mainCanvas.height=H;
    const fc=document.getElementById('fluid-canvas'); fc.width=W; fc.height=H;
    this._bgGifCanvasA.width=W; this._bgGifCanvasA.height=H;
    this._bgGifCanvasB.width=W; this._bgGifCanvasB.height=H;
    this._drawBgGifFrame('a');
    this._drawBgGifFrame('b');
    if(window.fluidSim)window.fluidSim.resize();
    this.layout=buildLayout(W,H,Config.ks.height_percent,Config.ks.width_percent??100);
    if(this.fx)this.fx.resize(W,H); else this.fx=new FXRenderer(W,H);
  }

  _makeBgEntry(file){
    return{
      url:URL.createObjectURL(file),
      blob:file,
      name:file.name,
      isGif:/\.gif$/i.test(file.name),
      slide_ms:Math.max(500,Config.ds.bg_slide_ms??5000),
      fade_ms:Math.max(0,Config.ds.bg_fade_ms??1000),
      gif_speed_pct:Math.max(10,Math.min(300,Config.ds.gif_speed_percent??100)),
      _gifFrames:null,
      _gifDurations:null,
      _gifDecodePromise:null,
      _gifDecodeFailed:false,
    };
  }
  _bgLayerParts(key){
    if(key==='a')return{layer:this._bgA,canvas:this._bgGifCanvasA,ctx:this._bgGifCtxA,state:this._bgLayerState.a};
    return{layer:this._bgB,canvas:this._bgGifCanvasB,ctx:this._bgGifCtxB,state:this._bgLayerState.b};
  }
  _bgGifSpeed(entry){
    const sp=Number(entry?.gif_speed_pct??100);
    if(!Number.isFinite(sp))return 100;
    return Math.max(10,Math.min(300,sp));
  }
  _drawCoverFrame(ctx,canvas,frame){
    if(!ctx||!canvas||!frame)return;
    const cw=canvas.width,ch=canvas.height,fw=frame.width,fh=frame.height;
    if(cw<=0||ch<=0||fw<=0||fh<=0)return;
    const sc=Math.max(cw/fw,ch/fh);
    const dw=fw*sc,dh=fh*sc;
    const dx=(cw-dw)*0.5,dy=(ch-dh)*0.5;
    ctx.clearRect(0,0,cw,ch);
    ctx.drawImage(frame,dx,dy,dw,dh);
  }
  _drawBgGifFrame(key){
    const {canvas,ctx,state}=this._bgLayerParts(key);
    if(state.mode!=='gif'||!state.frames?.length||!ctx||!canvas)return;
    const frame=state.frames[state.frameIdx%state.frames.length];
    this._drawCoverFrame(ctx,canvas,frame);
  }
  _ensureBgGifLoop(){
    if(this._bgGifRaf)return;
    this._bgGifRaf=requestAnimationFrame(ts=>this._tickBgGifs(ts));
  }
  _tickBgGifs(now){
    this._bgGifRaf=0;
    let any=false;
    ['a','b'].forEach(key=>{
      const {state}=this._bgLayerParts(key);
      if(state.mode!=='gif'||!state.frames?.length||!state.entry)return;
      any=true;
      if(!state.lastTs)state.lastTs=now;
      const dt=Math.max(0,now-state.lastTs);
      state.lastTs=now;
      state.frameMs+=dt*(this._bgGifSpeed(state.entry)/100);
      let changed=false;
      let guard=0;
      while(state.durations?.length&&state.frameMs>=state.durations[state.frameIdx%state.durations.length]&&guard<state.frames.length*2){
        state.frameMs-=state.durations[state.frameIdx%state.durations.length];
        state.frameIdx=(state.frameIdx+1)%state.frames.length;
        changed=true;
        guard++;
      }
      if(changed)this._drawBgGifFrame(key);
    });
    if(any)this._bgGifRaf=requestAnimationFrame(ts=>this._tickBgGifs(ts));
  }
  _deactivateBgLayer(key){
    const {layer,canvas,ctx,state}=this._bgLayerParts(key);
    state.token++;
    state.mode='css';
    state.entry=null;
    state.frames=null;
    state.durations=null;
    state.frameIdx=0;
    state.frameMs=0;
    state.lastTs=0;
    if(ctx)ctx.clearRect(0,0,canvas.width,canvas.height);
    canvas.style.display='none';
    layer.style.backgroundImage='none';
  }
  _disposeBgGifCache(entry){
    if(!entry)return;
    if(Array.isArray(entry._gifFrames)){
      entry._gifFrames.forEach(f=>{try{f?.close?.();}catch(_){}});
    }
    entry._gifFrames=null;
    entry._gifDurations=null;
    entry._gifDecodePromise=null;
  }
  async _ensureGifDecoded(entry){
    if(!entry?.isGif||entry._gifDecodeFailed)return null;
    if(Array.isArray(entry._gifFrames)&&entry._gifFrames.length&&Array.isArray(entry._gifDurations)&&entry._gifDurations.length)
      return{frames:entry._gifFrames,durations:entry._gifDurations};
    if(entry._gifDecodePromise)return entry._gifDecodePromise;
    if(typeof ImageDecoder==='undefined'||!entry.blob){
      entry._gifDecodeFailed=true;
      return null;
    }
    entry._gifDecodePromise=(async()=>{
      try{
        const buf=await entry.blob.arrayBuffer();
        const mime=(entry.blob.type&&entry.blob.type.startsWith('image/'))?entry.blob.type:'image/gif';
        const dec=new ImageDecoder({data:buf,type:mime});
        await dec.tracks.ready;
        const track=dec.tracks.selectedTrack;
        const frameCount=(track&&Number.isFinite(track.frameCount))?track.frameCount:0;
        if(!frameCount){try{dec.close?.();}catch(_){} return null;}
        const frames=[],durations=[];
        for(let i=0;i<frameCount;i++){
          const out=await dec.decode({frameIndex:i,completeFramesOnly:true});
          const vf=out.image;
          const bmp=await createImageBitmap(vf);
          const durUs=Number(vf.duration??0);
          durations.push(Math.max(16,durUs>0?durUs/1000:100));
          frames.push(bmp);
          vf.close();
        }
        try{dec.close?.();}catch(_){}
        if(!frames.length)return null;
        entry._gifFrames=frames;
        entry._gifDurations=durations;
        return{frames,durations};
      }catch(_){
        entry._gifDecodeFailed=true;
        return null;
      }finally{
        entry._gifDecodePromise=null;
      }
    })();
    return entry._gifDecodePromise;
  }
  async _setBgLayerEntry(key,entry){
    const {layer,canvas,state}=this._bgLayerParts(key);
    state.token++;
    const token=state.token;
    state.mode='css';
    state.entry=entry;
    state.frames=null;
    state.durations=null;
    state.frameIdx=0;
    state.frameMs=0;
    state.lastTs=0;
    canvas.style.display='none';
    layer.style.backgroundImage=`url("${entry.url}")`;
    if(!entry?.isGif)return;
    const decoded=await this._ensureGifDecoded(entry);
    if(state.token!==token||state.entry!==entry)return;
    if(!decoded?.frames?.length||!decoded?.durations?.length)return;
    state.mode='gif';
    state.frames=decoded.frames;
    state.durations=decoded.durations;
    state.frameIdx=0;
    state.frameMs=0;
    state.lastTs=0;
    layer.style.backgroundImage='none';
    canvas.style.display='block';
    this._drawBgGifFrame(key);
    this._ensureBgGifLoop();
  }
  _restartBgSlide(){
    clearTimeout(this._bgSlideTimer); this._bgSlideTimer=null;
    if(!this._bgImages.length){this._clearBgSlides();return;}
    this._bgSlideIdx=this._bgSlideIdx%this._bgImages.length;
    this._showBgSlide();
  }
  setBgImages(files){ this.clearBgImages(); this.addBgImages(files); }
  addBgImages(files){
    for(const f of files)
      this._bgImages.push(this._makeBgEntry(f));
    if(!this._bgSlideTimer&&this._bgImages.length>0)this._startBgSlide();
    this._refreshBgThumbs();
  }
  removeBgImage(index){
    const e=this._bgImages[index]; if(!e)return;
    this._disposeBgGifCache(e);
    URL.revokeObjectURL(e.url);
    this._bgImages.splice(index,1);
    clearTimeout(this._bgSlideTimer); this._bgSlideTimer=null;
    this._bgSlideIdx=Math.min(this._bgSlideIdx,Math.max(0,this._bgImages.length-1));
    if(this._bgImages.length>0)this._startBgSlide(); else this._clearBgSlides();
    this._refreshBgThumbs();
  }
  shuffleBgImages(){
    for(let i=this._bgImages.length-1;i>0;i--){
      const j=Math.floor(Math.random()*(i+1));
      [this._bgImages[i],this._bgImages[j]]=[this._bgImages[j],this._bgImages[i]];
    }
    clearTimeout(this._bgSlideTimer); this._bgSlideTimer=null;
    this._bgSlideIdx=0;
    if(this._bgImages.length>0)this._startBgSlide();
    this._refreshBgThumbs();
  }
  clearBgImages(){
    clearTimeout(this._bgSlideTimer); this._bgSlideTimer=null;
    for(const e of this._bgImages){
      this._disposeBgGifCache(e);
      URL.revokeObjectURL(e.url);
    }
    this._bgImages=[];
    this._bgSlideIdx=0;
    this._clearBgSlides();
    this._refreshBgThumbs();
  }
  _clearBgSlides(){
    this._deactivateBgLayer('a');
    this._deactivateBgLayer('b');
    this._bgA.style.opacity='1';
    this._bgB.style.opacity='0';
    this._bgFront='a';
  }
  _startBgSlide(){
    clearTimeout(this._bgSlideTimer); this._bgSlideTimer=null;
    if(!this._bgImages.length){this._clearBgSlides();return;}
    this._bgSlideIdx=this._bgSlideIdx%this._bgImages.length;
    this._showBgSlide();
  }
  _showBgSlide(){
    if(!this._bgImages.length)return;
    const entry=this._bgImages[this._bgSlideIdx%this._bgImages.length];
    const slideMs=Math.max(500,entry.slide_ms??Config.ds.bg_slide_ms??5000);
    const fadeMs=Math.max(0,entry.fade_ms??Config.ds.bg_fade_ms??1000);
    const isA=this._bgFront==='a';
    const frontKey=isA?'a':'b';
    const backKey=isA?'b':'a';
    const front=isA?this._bgA:this._bgB;
    const back=isA?this._bgB:this._bgA;
    back.style.transition='none';
    back.style.opacity='0';
    this._setBgLayerEntry(backKey,entry);
    back.getBoundingClientRect(); // force reflow before transitioning
    back.style.transition=`opacity ${fadeMs}ms linear`;
    back.style.opacity='1';
    setTimeout(()=>{
      front.style.transition=`opacity ${fadeMs}ms linear`;
      front.style.opacity='0';
      this._bgFront=isA?'b':'a';
      this._deactivateBgLayer(frontKey);
    },fadeMs);
    if(this._bgImages.length>1)
      this._bgSlideTimer=setTimeout(()=>{
        this._bgSlideIdx=(this._bgSlideIdx+1)%this._bgImages.length;
        this._showBgSlide();
      },slideMs+fadeMs);
  }
  _refreshBgThumbs(){
    const imgs=this._bgImages;
    document.querySelectorAll('.bg-item-list').forEach(list=>{
      list.innerHTML='';
      imgs.forEach((e,i)=>{
        const card=document.createElement('div');
        card.className='bg-item-card';

        const top=document.createElement('div');
        top.className='bg-item-top';

        const thumb=document.createElement('div');
        thumb.className='bg-thumb-mini';
        thumb.style.backgroundImage=`url(${e.url})`;
        top.appendChild(thumb);

        const name=document.createElement('span');
        name.className='bg-item-name';
        name.textContent=e.name||`Image ${i+1}`;
        name.title=e.name||`Image ${i+1}`;
        top.appendChild(name);

        if(e.isGif){
          const tag=document.createElement('span');
          tag.className='bg-thumb-gif';tag.textContent='GIF';
          top.appendChild(tag);
        }

        const x=document.createElement('button');
        x.className='bg-item-x';x.textContent='×';
        x.onclick=()=>this.removeBgImage(i);
        top.appendChild(x);
        card.appendChild(top);

        const sliders=document.createElement('div');
        sliders.className='bg-item-sliders';

        const mkRow=(label,min,max,step,val,unit,onInput)=>{
          const row=document.createElement('div');
          row.className='bg-slider-row';
          const lbl=document.createElement('label');lbl.textContent=label;
          const sl=document.createElement('input');sl.type='range';sl.min=min;sl.max=max;sl.step=step;sl.value=val;
          const sv=document.createElement('span');sv.className='bg-sv';sv.textContent=val+unit;
          sl.addEventListener('input',()=>{
            sv.textContent=sl.value+unit;
            onInput(+sl.value);
          });
          row.appendChild(lbl);row.appendChild(sl);row.appendChild(sv);
          return row;
        };

        sliders.appendChild(mkRow('Slide',1,60,1,Math.round((e.slide_ms??5000)/1000),'s',v=>{
          e.slide_ms=v*1000;
          if(i===this._bgSlideIdx)this._restartBgSlide();
        }));
        sliders.appendChild(mkRow('Fade',0,10,0.5,((e.fade_ms??1000)/1000).toFixed(1),'s',v=>{
          e.fade_ms=v*1000;
          if(i===this._bgSlideIdx)this._restartBgSlide();
        }));
        if(e.isGif)
          sliders.appendChild(mkRow('Speed',10,300,10,e.gif_speed_pct??100,'%',v=>{
            e.gif_speed_pct=v;
          }));

        card.appendChild(sliders);
        list.appendChild(card);
      });
    });
    const n=imgs.length;
    document.querySelectorAll('#bg-img-count').forEach(el=>{
      el.textContent=n?`${n} image${n>1?'s':''}` :'';
    });
  }

  // Screen management
  _showScreen(id){
    document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
    document.getElementById(id)?.classList.add('active');
    document.getElementById('hud').classList.remove('active');
    this._vizActive=false;
  }
  showMenu(){
    this._showScreen('screen-menu');
    if(this._mode==='file'&&this.midiFile.playing)this.midiFile.pause();
  }
  showVisualizer(){
    document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
    document.getElementById('hud').classList.add('active');
    this._vizActive=true;
    this.mainCanvas.focus();
  }
  showDeviceSelect(){
    this._showScreen('screen-device');
    this._refreshDeviceList();
  }
  showFileSelect(){this._showScreen('screen-file'); this._refreshRecent();}
  showSettings(){this._showScreen('screen-settings');}

  showTrackConfig(){
    this._showScreen('screen-tracks');
    const info=this.midiFile.getChannelInfo();
    document.getElementById('tracks-filename').textContent=this.midiFile.filename||'Configure Tracks';
    const NOTE_NAMES=['C','C#','D','D#','E','F','F#','G','A♭','A','B♭','B'];
    const noteName=n=>NOTE_NAMES[n%12]+(Math.floor(n/12)-1);
    // Default palette — ch9 gets grey (drums)
    const PAL=[[0,230,230],[180,80,255],[255,80,80],[80,220,120],[255,190,40],[60,140,255],[255,90,180],[40,220,220],[255,140,40],[160,160,170],[200,255,100],[255,60,120],[100,200,255],[255,220,180],[180,255,200],[220,180,255]];
    const toHex=(r,g,b)=>'#'+[r,g,b].map(v=>Math.max(0,Math.min(255,v)).toString(16).padStart(2,'0')).join('');
    // Build config — preserve existing or create fresh
    if(!this._channelConfig||this._channelConfig._file!==this.midiFile.filename){
      this._channelConfig=Array.from({length:16},(_,i)=>({muted:false,isPlayer:true,r:PAL[i][0],g:PAL[i][1],b:PAL[i][2]}));
      this._channelConfig._file=this.midiFile.filename;
    }
    const list=document.getElementById('track-channel-list');
    list.innerHTML='';
    info.forEach(({ch,count,minNote,maxNote})=>{
      const cfg=this._channelConfig[ch];
      const row=document.createElement('div');
      row.className='track-row'+(cfg.muted?' muted':'');
      row.innerHTML=`
        <span class="track-ch-label">Ch ${ch+1}</span>
        <span class="track-ch-meta">${count} notes &nbsp;·&nbsp; ${noteName(minNote)}–${noteName(maxNote)}</span>
        <input type="color" class="track-color-swatch" value="${toHex(cfg.r,cfg.g,cfg.b)}" title="Channel colour">
        <button class="track-player-btn${cfg.isPlayer?' active':''}" title="Mark as your part">You play</button>
        <button class="track-mute-btn${cfg.muted?' muted':''}">${cfg.muted?'Muted':'Active'}</button>`;
      const colorEl=row.querySelector('.track-color-swatch');
      colorEl.oninput=e=>{
        const hex=e.target.value;
        cfg.r=parseInt(hex.slice(1,3),16);cfg.g=parseInt(hex.slice(3,5),16);cfg.b=parseInt(hex.slice(5,7),16);
      };
      const playerBtn=row.querySelector('.track-player-btn');
      playerBtn.onclick=()=>{cfg.isPlayer=!cfg.isPlayer;playerBtn.classList.toggle('active',cfg.isPlayer);};
      const muteBtn=row.querySelector('.track-mute-btn');
      muteBtn.onclick=()=>{
        cfg.muted=!cfg.muted;
        muteBtn.textContent=cfg.muted?'Muted':'Active';
        muteBtn.classList.toggle('muted',cfg.muted);
        row.classList.toggle('muted',cfg.muted);
      };
      list.appendChild(row);
    });
  }

  _applyChannelConfig(){
    if(!this._channelConfig)return;
    const channelColors=new Array(16).fill(null);
    for(let ch=0;ch<16;ch++){
      const c=this._channelConfig[ch];
      if(!c||c.muted)continue;
      const dim=c.isPlayer?1:0.35;
      channelColors[ch]={r:Math.round(c.r*dim),g:Math.round(c.g*dim),b:Math.round(c.b*dim)};
    }
    Config.ns.note_colors={notes:new Array(128).fill(null),channelColors,zones:[]};
    Config.ns.color_mode='script';
  }
  togglePanel(){
    this._panelOpen=!this._panelOpen;
    document.getElementById('panel-settings').classList.toggle('open',this._panelOpen);
  }

  async _refreshDeviceList(){
    const list=document.getElementById('device-list');
    list.innerHTML='<div style="color:var(--muted);font-size:13px">Detecting MIDI ports…</div>';
    const note=document.getElementById('midi-api-note');
    if(!navigator.requestMIDIAccess){
      note.textContent='Web MIDI requires Chrome or Edge. Using QWERTY keyboard.';
    }else{
      await this.midi.requestAccess();
      note.textContent='';
    }
    const ports=this.midi.listPorts();
    list.innerHTML='';
    ports.forEach(p=>{
      const item=document.createElement('div');
      item.className='device-item'+(p.id===this._selectedPortId?' selected':'');
      item.textContent=p.name;
      item.onclick=async()=>{
        this._selectedPortId=p.id;
        await this.midi.init(p.id);
        this.prevNotes.clear();this._activeNotes.clear();
        this._hudDevice.textContent=this.midi.portName;
        if(this._mode==='freeplay')this.showVisualizer();
        else this.showVisualizer();
      };
      list.appendChild(item);
    });
  }

  _refreshRecent(){
    const rc=document.getElementById('recent-files');
    const names=JSON.parse(localStorage.getItem('pianoVisRecentFiles')||'[]');
    if(!names.length){rc.innerHTML='';return;}
    rc.innerHTML=`<h3>Recent</h3>${names.map(n=>`<div class="recent-item">${n}</div>`).join('')}`;
  }

  _addRecent(name){
    const key='pianoVisRecentFiles';
    let names=JSON.parse(localStorage.getItem(key)||'[]');
    names=names.filter(n=>n!==name).slice(0,9);
    names.unshift(name);
    localStorage.setItem(key,JSON.stringify(names));
  }

  _setupScreens(){
    // Menu
    document.getElementById('btn-select-file').onclick=()=>this.showFileSelect();
    document.getElementById('btn-freeplay').onclick=()=>{this._mode='freeplay';this.showDeviceSelect();};
    document.getElementById('btn-midi-device').onclick=()=>this.showDeviceSelect();
    document.getElementById('btn-settings').onclick=()=>this.showSettings();
    document.getElementById('btn-fullscreen-menu').onclick=()=>toggleFullscreen();
    // Device select
    document.getElementById('btn-device-back').onclick=()=>this.showMenu();
    // Track config
    document.getElementById('btn-tracks-back').onclick=()=>this.showFileSelect();
    document.getElementById('btn-tracks-play').onclick=()=>{
      this._applyChannelConfig();
      this.prevNotes.clear();this._activeNotes?.clear();
      this._pendingFilePlay=true;
      this.showVisualizer();
      this.startFilePlayback();
    };
    // File select
    document.getElementById('btn-file-back').onclick=()=>this.showMenu();
    document.getElementById('btn-browse').onclick=()=>document.getElementById('file-input').click();
    document.getElementById('file-input').onchange=e=>{
      const f=e.target.files[0]; if(!f)return;
      this._loadMidiFile(f);
    };
    const dz=document.getElementById('drop-zone');
    dz.addEventListener('dragover',e=>{e.preventDefault();dz.classList.add('drag-over');});
    dz.addEventListener('dragleave',()=>dz.classList.remove('drag-over'));
    dz.addEventListener('drop',e=>{
      e.preventDefault(); dz.classList.remove('drag-over');
      const f=e.dataTransfer.files[0]; if(f)this._loadMidiFile(f);
    });
    // Drop onto canvas while streaming — swap file without leaving visualiser
    const mc=document.getElementById('main-canvas');
    mc.addEventListener('dragover',e=>{if(this._vizActive)e.preventDefault();});
    mc.addEventListener('drop',e=>{
      if(!this._vizActive)return;
      e.preventDefault();
      const f=e.dataTransfer.files[0];
      if(f&&/\.midi?$/i.test(f.name))this._loadMidiFileInPlace(f);
    });
    // Settings back
    document.getElementById('btn-settings-back').onclick=()=>this.showMenu();
    // Settings nav
    document.querySelectorAll('.snav-btn').forEach(btn=>{
      btn.addEventListener('click',()=>{
        document.querySelectorAll('.snav-btn').forEach(b=>b.classList.remove('active'));
        document.querySelectorAll('.stab-panel').forEach(p=>p.classList.remove('active'));
        btn.classList.add('active');
        const p=document.getElementById('stab-'+btn.dataset.stab); if(p)p.classList.add('active');
        if(btn.dataset.stab==='led')updateLedStatus(document,this);

  _setupHUD(){
    document.getElementById('btn-hud-settings').onclick=()=>this.togglePanel();

    document.getElementById('btn-hud-menu').onclick=()=>this.showMenu();
    document.getElementById('btn-panel-close').onclick=()=>this.togglePanel();
  }

  _buildSettingsScreens(){
    // Full settings screen content
    const content=document.getElementById('settings-content');
    const TABS=[
      {id:'notes',label:'Notes'},{id:'effects',label:'Effects'},{id:'fluid',label:'Fluid'},
      {id:'keyboard',label:'Keyboard'},{id:'display',label:'Display'},
      {id:'hardware',label:'Hardware'},
      {id:'led',label:'LED Output'},{id:'audience',label:'Audience'},
      {id:'themes',label:'Themes'},{id:'profiles',label:'Profiles'},
    ];
    content.innerHTML=TABS.map((t,i)=>`<div class="stab-panel${i===0?' active':''}" id="stab-${t.id}">${buildSettingsHTML(t.id)}</div>`).join('');
    wireSettings(content,this);
    // Sidebar panel
    const PANEL_TABS=[
      {id:'notes',label:'Notes',active:true},{id:'effects',label:'FX'},{id:'fluid',label:'Fluid'},
      {id:'keyboard',label:'Keys'},{id:'display',label:'Display'},{id:'led',label:'LED'},
      {id:'audience',label:'Aud.'},{id:'themes',label:'Themes'},{id:'tracks',label:'Tracks'},
    ];
    buildPanel(document.getElementById('ptab-panels'),document.getElementById('ptab-bar'),PANEL_TABS,this);
    document.querySelector('#ptab-bar button[data-t="tracks"]')
      ?.addEventListener('click',()=>this._refreshTracksTab());
  }

  async _loadMidiFile(file){
    const buf=await file.arrayBuffer();
    this.midiFile.load(buf,file.name);
    this._addRecent(file.name);
    this._mode='file';
    document.getElementById('hud-song').textContent=file.name;
    this.showTrackConfig();
    this._refreshTracksTab();
  }

  startFilePlayback(){
    if(this._pendingFilePlay){this.midiFile.play();this._pendingFilePlay=false;}
  }
  _showToast(msg){
    const t=document.getElementById('toast');
    t.textContent=msg; t.classList.add('show');
    clearTimeout(this._toastTimer);
    this._toastTimer=setTimeout(()=>t.classList.remove('show'),2500);
  }
  async _loadMidiFileInPlace(file){
    const PAL=[[0,230,230],[180,80,255],[255,80,80],[80,220,120],[255,190,40],[60,140,255],[255,90,180],[40,220,220],[255,140,40],[160,160,170],[200,255,100],[255,60,120],[100,200,255],[255,220,180],[180,255,200],[220,180,255]];
    const buf=await file.arrayBuffer();
    this.midiFile.load(buf,file.name);
    this._addRecent(file.name);
    this._mode='file';
    document.getElementById('hud-song').textContent=file.name;
    this._channelConfig=Array.from({length:16},(_,i)=>({muted:false,isPlayer:true,r:PAL[i][0],g:PAL[i][1],b:PAL[i][2]}));
    this._channelConfig._file=file.name;
    this._applyChannelConfig();
    this.prevNotes.clear();
    this.trails.active.clear();
    this.midiFile.play();
    this._refreshTracksTab();
    this._showToast(file.name);
  }
  _refreshTracksTab(){
    const wrap=document.querySelector('#tp-tracks #tracks-tab-content');
    if(!wrap)return;
    if(this._mode!=='file'||!this.midiFile.events.length){
      wrap.innerHTML='<p style="color:var(--muted);font-size:12px">No file loaded.</p>';return;
    }
    const PAL=[[0,230,230],[180,80,255],[255,80,80],[80,220,120],[255,190,40],[60,140,255],[255,90,180],[40,220,220],[255,140,40],[160,160,170],[200,255,100],[255,60,120],[100,200,255],[255,220,180],[180,255,200],[220,180,255]];
    const toHex=(r,g,b)=>'#'+[r,g,b].map(v=>Math.max(0,Math.min(255,v)).toString(16).padStart(2,'0')).join('');
    if(!this._channelConfig||this._channelConfig._file!==this.midiFile.filename){
      this._channelConfig=Array.from({length:16},(_,i)=>({muted:false,isPlayer:true,r:PAL[i][0],g:PAL[i][1],b:PAL[i][2]}));
      this._channelConfig._file=this.midiFile.filename;
    }
    wrap.innerHTML='';
    this.midiFile.getChannelInfo().forEach(({ch})=>{
      const cfg=this._channelConfig[ch];
      const row=document.createElement('div');
      row.className='track-row'+(cfg.muted?' muted':'');
      row.style.cssText='margin-bottom:6px';
      row.innerHTML=`<span class="track-ch-label">Ch ${ch+1}</span>
        <input type="color" class="track-color-swatch" value="${toHex(cfg.r,cfg.g,cfg.b)}" title="Channel colour">
        <button class="track-player-btn${cfg.isPlayer?' active':''}">You play</button>
        <button class="track-mute-btn${cfg.muted?' muted':''}">${cfg.muted?'Muted':'Active'}</button>`;
      row.querySelector('.track-color-swatch').oninput=e=>{
        const h=e.target.value;
        cfg.r=parseInt(h.slice(1,3),16);cfg.g=parseInt(h.slice(3,5),16);cfg.b=parseInt(h.slice(5,7),16);
        this._applyChannelConfig();
      };
      const pb=row.querySelector('.track-player-btn');
      pb.onclick=()=>{cfg.isPlayer=!cfg.isPlayer;pb.classList.toggle('active',cfg.isPlayer);this._applyChannelConfig();};
      const mb=row.querySelector('.track-mute-btn');
      mb.onclick=()=>{cfg.muted=!cfg.muted;mb.textContent=cfg.muted?'Muted':'Active';mb.classList.toggle('muted',cfg.muted);row.classList.toggle('muted',cfg.muted);this._applyChannelConfig();};
      wrap.appendChild(row);
    });
  }
}

function toggleFullscreen(){
  if(!document.fullscreenElement) document.documentElement.requestFullscreen?.();
  else document.exitFullscreen?.();
}

  _blit(target,clear=false){

  _initFramebuffers(){

    const simRes=this._getResolution(config.SIM_RESOLUTION),dyeRes=this._getResolution(config.DYE_RESOLUTION);
    const texType=ext.halfFloatTexType,rgba=ext.formatRGBA,rg=ext.formatRG,r=ext.formatR;

    if(this.velocity==null)this.velocity=this._createDoubleFBO(simRes.width,simRes.height,rg.internalFormat,rg.format,texType,filtering);
    else this.velocity=this._resizeDoubleFBO(this.velocity,simRes.width,simRes.height,rg.internalFormat,rg.format,texType,filtering);
    this.divergence=this._createFBO(simRes.width,simRes.height,r.internalFormat,r.format,texType,gl.NEAREST);
    this.curl=this._createFBO(simRes.width,simRes.height,r.internalFormat,r.format,texType,gl.NEAREST);

  }
  _createFBO(w,h,iF,f,t,p){
    const gl=this.gl;gl.activeTexture(gl.TEXTURE0);
    const texture=gl.createTexture();gl.bindTexture(gl.TEXTURE_2D,texture);gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MIN_FILTER,p);gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MAG_FILTER,p);gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_S,gl.CLAMP_TO_EDGE);gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_T,gl.CLAMP_TO_EDGE);gl.texImage2D(gl.TEXTURE_2D,0,iF,w,h,0,f,t,null);

  }
  _createDoubleFBO(w,h,iF,f,t,p){
    let a=this._createFBO(w,h,iF,f,t,p),b=this._createFBO(w,h,iF,f,t,p);
    return{width:w,height:h,texelSizeX:a.texelSizeX,texelSizeY:a.texelSizeY,get read(){return a;},set read(v){a=v;},get write(){return b;},set write(v){b=v;},swap(){const tmp=a;a=b;b=tmp;}};
  }
  _resizeFBO(target,w,h,iF,f,t,p){const n=this._createFBO(w,h,iF,f,t,p);this.copyProgram.bind();this.gl.uniform1i(this.copyProgram.uniforms.uTexture,target.attach(0));this._blit(n);return n;}
  _resizeDoubleFBO(target,w,h,iF,f,t,p){
    if(target.width===w&&target.height===h)return target;
    target.read=this._resizeFBO(target.read,w,h,iF,f,t,p);target.write=this._createFBO(w,h,iF,f,t,p);
    target.width=w;target.height=h;target.texelSizeX=1/w;target.texelSizeY=1/h;return target;
  }
  _drawDisplay(target){
    const{gl,config}=this;
    this.displayMaterial.bind();
    gl.uniform1i(this.displayMaterial.uniforms.uTexture,this.dye.read.attach(0));
    if(this.displayMaterial.uniforms.uIntensity!=null)gl.uniform1f(this.displayMaterial.uniforms.uIntensity,config.INTENSITY??1.0);

  }
  _updateKeywords(){this.displayMaterial&&this.displayMaterial.setKeywords([]);}
  _getResolution(res){
    const gl=this.gl;let ar=gl.drawingBufferWidth/gl.drawingBufferHeight;if(ar<1)ar=1/ar;
    const mn=Math.round(res),mx=Math.round(res*ar);return gl.drawingBufferWidth>gl.drawingBufferHeight?{width:mx,height:mn}:{width:mn,height:mx};
  }
  _correctRadius(radius){const ar=this.canvas.width/this.canvas.height;if(ar>1)radius*=ar;return radius;}
  _compileShader(type,source){
    const gl=this.gl,shader=gl.createShader(type);gl.shaderSource(shader,source);gl.compileShader(shader);
    if(!gl.getShaderParameter(shader,gl.COMPILE_STATUS))console.error('Shader error:',gl.getShaderInfoLog(shader));
    return shader;
  }
}
class _FluidProgram{
  constructor(gl,vs,fs){this.gl=gl;this.program=gl.createProgram();gl.attachShader(this.program,vs);gl.attachShader(this.program,fs);gl.linkProgram(this.program);this.uniforms=_fluidGetUniforms(gl,this.program);}
  bind(){this.gl.useProgram(this.program);}
}
class _FluidMaterial{
  constructor(gl,vs,fsSrc,sim){this.gl=gl;this.vs=vs;this.fsSrc=fsSrc;this.sim=sim;this.programs={};this.activeProgram=null;this.uniforms={};}
  setKeywords(kw){
    const hash=kw.join(',');
    if(!this.programs[hash]){const src=kw.map(k=>'#define '+k).join('\n')+'\n'+this.fsSrc;const fs=this.sim._compileShader(this.gl.FRAGMENT_SHADER,src);this.programs[hash]=new _FluidProgram(this.gl,this.vs,fs);}
    const p=this.programs[hash];if(p===this.activeProgram)return;this.uniforms=p.uniforms;this.activeProgram=p;
  }
  bind(){this.gl.useProgram(this.activeProgram.program);}
}
function _fluidGetUniforms(gl,prog){const u={},n=gl.getProgramParameter(prog,gl.ACTIVE_UNIFORMS);for(let i=0;i<n;i++){const name=gl.getActiveUniform(prog,i).name;u[name]=gl.getUniformLocation(prog,name);}return u;}

(function(){
  const canvas=document.getElementById('fluid-canvas');
  canvas.width=window.innerWidth; canvas.height=window.innerHeight;
  try{
    const sim=new FluidSimulation(canvas,{SIM_RESOLUTION:128,DYE_RESOLUTION:512,DENSITY_DISSIPATION:2.2,VELOCITY_DISSIPATION:0.7,PRESSURE:0.8,CURL:30});
    window.fluidSim=sim;
    let lastT=performance.now();
    function frame(now){
      requestAnimationFrame(frame);
      const dt=Math.min((now-lastT)/1000,.033); lastT=now;
      sim.step(dt);sim.render();
    }
    requestAnimationFrame(frame);
  }catch(e){console.warn('Fluid simulation failed:',e);}
})();
