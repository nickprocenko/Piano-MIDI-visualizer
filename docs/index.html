<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Piano MIDI Visualizer</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Three stacked canvas layers -->
  <canvas id="fluid-canvas"></canvas>
  <canvas id="highway-canvas"></canvas>
  <canvas id="piano-canvas"></canvas>

  <!-- Header overlay (pointer-events only on children) -->
  <div id="ui">
    <div id="header">
      <div class="header-left">
        <span id="midi-dot" class="dot"></span>
        <button id="midi-btn" class="pill-btn">MIDI</button>
      </div>
      <button id="settings-btn" class="gear-btn" title="Settings">&#9881;</button>
    </div>
  </div>

  <!-- Settings panel -->
  <aside id="settings-panel">
    <div id="panel-header">
      <span>Effects Editor</span>
      <button id="settings-close">&times;</button>
    </div>
    <div id="panel-body">

      <!-- NOTE APPEARANCE -->
      <details open>
        <summary>Note</summary>
        <div class="sc">
          <label>Outer Colour <input type="color" id="note-color"></label>
          <label>Colour Mode
            <select id="note-color-mode">
              <option value="solid">Solid</option>
              <option value="rainbow">Rainbow</option>
              <option value="fire">Fire</option>
              <option value="water">Water</option>
              <option value="sunset">Sunset</option>
              <option value="neon">Neon</option>
            </select>
          </label>
          <label>Inner Colour <input type="color" id="note-inner-color"></label>
          <div class="sr"><label>Inner Blend</label><input type="range" id="note-inner-blend" min="0" max="100"><span id="note-inner-blend-val"></span></div>
          <div class="sr"><label>Brightness</label><input type="range" id="note-brightness" min="20" max="200"><span id="note-brightness-val"></span></div>
          <div class="sr"><label>Glow</label><input type="range" id="note-glow" min="0" max="100"><span id="note-glow-val"></span></div>
          <div class="sr"><label>Body Opacity</label><input type="range" id="note-inner-opacity" min="20" max="100"><span id="note-inner-opacity-val"></span></div>
          <div class="sr"><label>Head Opacity</label><input type="range" id="note-head-opacity" min="0" max="100"><span id="note-head-opacity-val"></span></div>
          <div class="sr"><label>Speed (px/s)</label><input type="range" id="speed" min="100" max="1000" step="10"><span id="speed-val"></span></div>
          <div class="sr"><label>Width</label><input type="range" id="note-width" min="4" max="40"><span id="note-width-val"></span></div>
          <div class="sr"><label>Roundness</label><input type="range" id="note-edge-roundness" min="0" max="20"><span id="note-edge-roundness-val"></span></div>
        </div>
      </details>

      <!-- PARTICLE EFFECTS -->
      <details>
        <summary>Effects</summary>
        <div class="sc">
          <div class="er"><label class="tl"><input type="checkbox" id="effect-glow"> Glow Rings</label><input type="range" id="effect-glow-strength" min="0" max="180"><span id="effect-glow-strength-val"></span></div>
          <div class="er"><label class="tl"><input type="checkbox" id="effect-highlight"> Highlight</label><input type="range" id="effect-highlight-strength" min="0" max="170"><span id="effect-highlight-strength-val"></span></div>
          <div class="er"><label class="tl"><input type="checkbox" id="effect-sparks"> Sparks</label><input type="range" id="effect-sparks-amount" min="0" max="300" step="5"><span id="effect-sparks-amount-val"></span></div>
          <div class="er"><label class="tl"><input type="checkbox" id="effect-smoke"> Smoke</label><input type="range" id="effect-smoke-amount" min="0" max="300" step="5"><span id="effect-smoke-amount-val"></span></div>
          <div class="er"><label class="tl"><input type="checkbox" id="effect-press-mist"> Press Mist</label><input type="range" id="effect-press-mist-amount" min="0" max="250" step="5"><span id="effect-press-mist-amount-val"></span></div>
          <label class="tl bl"><input type="checkbox" id="effect-moon-dust"> Moon Dust</label>
          <label class="tl bl"><input type="checkbox" id="effect-steam"> Steam</label>
          <label class="tl bl"><input type="checkbox" id="effect-halo-pulse"> Halo Pulse</label>
        </div>
      </details>

      <!-- FLUID -->
      <details>
        <summary>Fluid</summary>
        <div class="sc">
          <label class="tl"><input type="checkbox" id="fluid-enabled"> Enable Fluid</label>
          <div class="sr"><label>Intensity</label><input type="range" id="fluid-intensity" min="0" max="200"><span id="fluid-intensity-val"></span></div>
          <label>Fluid Colour <input type="color" id="fluid-color"></label>
          <label>Colour Mode
            <select id="fluid-color-mode">
              <option value="solid">Solid</option>
              <option value="perNote">Per Note</option>
            </select>
          </label>
          <label>Source
            <select id="fluid-source">
              <option value="base">Base</option>
              <option value="head">Head</option>
              <option value="both">Both</option>
            </select>
          </label>
          <div class="sr"><label>Trail Repulsion</label><input type="range" id="fluid-repulsion" min="0" max="100"><span id="fluid-repulsion-val"></span></div>
          <div class="sr"><label>Splat Size</label><input type="range" id="fluid-radius" min="1" max="150"><span id="fluid-radius-val"></span></div>
          <div class="sr"><label>Tightness</label><input type="range" id="fluid-tightness" min="0" max="100"><span id="fluid-tightness-val"></span></div>
          <div class="sr"><label>Flow Speed</label><input type="range" id="fluid-speed" min="1" max="50"><span id="fluid-speed-val"></span></div>
          <div class="sr"><label>Density Fade</label><input type="range" id="density-dissipation" min="1" max="40"><span id="density-dissipation-val"></span></div>
          <div class="sr"><label>Velocity Fade</label><input type="range" id="velocity-dissipation" min="1" max="40"><span id="velocity-dissipation-val"></span></div>
          <div class="sr"><label>Curl</label><input type="range" id="curl" min="0" max="50"><span id="curl-val"></span></div>
          <label class="tl"><input type="checkbox" id="fluid-bloom"> Bloom</label>
          <div class="sr"><label>Bloom Intensity</label><input type="range" id="fluid-bloom-intensity" min="10" max="200"><span id="fluid-bloom-intensity-val"></span></div>
          <label class="tl"><input type="checkbox" id="fluid-sunrays"> Sun Rays</label>
          <div class="sr"><label>Rays Weight</label><input type="range" id="fluid-sunrays-weight" min="30" max="100"><span id="fluid-sunrays-weight-val"></span></div>
        </div>
      </details>

      <!-- KEYBOARD -->
      <details>
        <summary>Keyboard</summary>
        <div class="sc">
          <label class="tl"><input type="checkbox" id="show-keyboard"> Show Keyboard</label>
          <div class="sr"><label>Height</label><input type="range" id="keyboard-height" min="40" max="200"><span id="keyboard-height-val"></span></div>
        </div>
      </details>

      <!-- MIDI -->
      <details>
        <summary>MIDI</summary>
        <div class="sc">
          <div id="midi-inputs-list" class="midi-list">Click MIDI button to connect</div>
          <p class="hint">QWERTY fallback: A&ndash;L = white keys, W E T Y U O P = black keys</p>
        </div>
      </details>

      <!-- PRESETS -->
      <details>
        <summary>Presets</summary>
        <div class="sc">
          <div class="preset-row">
            <input type="text" id="preset-name" placeholder="Preset name">
            <button id="preset-save">Save</button>
          </div>
          <div id="preset-list"></div>
        </div>
      </details>

      <!-- EXPORT -->
      <div class="sc">
        <button id="export-btn" class="export-btn">Copy Desktop Config</button>
      </div>

    </div><!-- /panel-body -->
  </aside>

  <script type="module" src="js/app.js"></script>
</body>
</html>
